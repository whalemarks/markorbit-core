name: CORE-TASK-044 Workspace

on:
  pull_request:
  push:
    branches:
      - agent/core-task-044-order-service-foundation

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Package workspace
        run: tar --exclude=.git -czf /tmp/markorbit-core-workspace.tgz .
      - uses: actions/upload-artifact@v4
        with:
          name: core-task-044-workspace
          path: /tmp/markorbit-core-workspace.tgz
          retention-days: 1
