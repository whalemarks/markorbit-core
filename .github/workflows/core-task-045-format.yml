name: CORE-TASK-045 Format

on:
  push:
    branches:
      - agent/core-task-045-opportunity-service-foundation

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/core-task-045-opportunity-service-foundation
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Format changed implementation files
        shell: bash
        run: |
          mapfile -t files < <(git diff --name-only origin/main...HEAD | grep -v '^\.github/' | grep -v '^\.core-task')
          pnpm exec prettier --write "${files[@]}"
          rm -f .core-task-045-format-trigger
      - name: Commit formatting
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'CORE-TASK-045 — normalize governed formatting'
          git push origin HEAD:agent/core-task-045-opportunity-service-foundation
