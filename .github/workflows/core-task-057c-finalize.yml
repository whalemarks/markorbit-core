name: CORE-TASK-057C Finalize

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/core-task-057c-finalize.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/core-task-057c-final-api-boundaries
          fetch-depth: 0

      - name: Generate final API boundary implementation
        shell: bash
        run: |
          cat > src/api/core-governed-api-specs-057c.ts <<'EOF'
          import type { CoreGovernedApiBoundarySpec, CoreGovernedApiOperationSpec } from './core-governed-api-boundary.ts';

          const op = (
            apiOperation: string,
            serviceOperation: string,
            domain: string,
            duplicateSensitive: boolean,
            requiredPayloadFields: readonly string[],
            allowedPayloadFields: readonly string[],
            referenceFields: readonly string[] = [],
            objectFields: readonly string[] = [],
            arrayFields: readonly string[] = [],
            booleanFields: readonly string[] = []
          ): CoreGovernedApiOperationSpec => ({
            apiOperation,
            serviceOperation,
            governanceOperation: `${domain}.${apiOperation.replaceAll('-', '_')}`,
            operationCategory: apiOperation === 'get' || apiOperation === 'list' ? 'Read' : apiOperation.startsWith('validate') ? 'Validate' : apiOperation.startsWith('link') ? 'Link' : apiOperation === 'create' || apiOperation === 'record' ? 'Create' : apiOperation === 'archive' ? 'Archive' : 'Update',
            duplicateSensitive,
            requiredPermissionKey: `${domain}:${apiOperation === 'get' || apiOperation === 'list' || apiOperation.startsWith('validate') ? 'read' : 'update'}`,
            requiredPolicyScope: `${domain}.${apiOperation === 'get' || apiOperation === 'list' ? 'read' : 'write'}`,
            requiredPayloadFields,
            allowedPayloadFields,
            referenceFields,
            objectFields,
            arrayFields,
            booleanFields
          });

          const crud = (domain: string, prefix: string): readonly CoreGovernedApiOperationSpec[] => [
            op('create', `create${prefix}`, domain, true, ['objectRecord','publicReferenceRecord','sourceReference'], ['objectRecord','publicReferenceRecord','sourceReference','metadata','aiInitiated','agentContractReferenceId'], ['sourceReference','agentContractReferenceId'], ['objectRecord','publicReferenceRecord','metadata'], [], ['aiInitiated']),
            op('get', `get${prefix}`, domain, false, [`${domain}ReferenceId`], [`${domain}ReferenceId`], [`${domain}ReferenceId`]),
            op('list', `list${prefix}s`, domain, false, [], ['organizationReferenceId','status','limit','cursor'], ['organizationReferenceId','cursor']),
            op('update', `update${prefix}`, domain, true, [`${domain}ReferenceId`], [`${domain}ReferenceId`,'metadata','reasonReference'], [`${domain}ReferenceId`,'reasonReference'], ['metadata']),
            op('validate-reference', `validate${prefix}Reference`, domain, false, [`${domain}ReferenceId`,'requestingDomain','requestingService'], [`${domain}ReferenceId`,'requestingDomain','requestingService'], [`${domain}ReferenceId`])
          ];

          const link = (domain: string, prefix: string, target: string, plural = false) => op(
            `link-${target.replaceAll('_','-')}`,
            `link${prefix}${target.split('_').map((part) => part[0]!.toUpperCase()+part.slice(1)).join('')}`,
            domain,
            true,
            [`${domain}ReferenceId`, plural ? `${target}ReferenceIds` : `${target}ReferenceId`],
            [`${domain}ReferenceId`, plural ? `${target}ReferenceIds` : `${target}ReferenceId`],
            [`${domain}ReferenceId`, ...(plural ? [] : [`${target}ReferenceId`])],
            [],
            plural ? [`${target}ReferenceIds`] : []
          );

          const matterOperations = [
            ...crud('matter','Matter'),
            op('change-status','changeMatterStatus','matter',true,['matterReferenceId','nextStatus','reasonReference'],['matterReferenceId','nextStatus','reasonReference'],['matterReferenceId','reasonReference']),
            link('matter','Matter','order'), link('matter','Matter','customer'), link('matter','Matter','brand'), link('matter','Matter','trademark'),
            link('matter','Matter','workflow_contract'), link('matter','Matter','task'), link('matter','Matter','document'), link('matter','Matter','evidence')
          ] as const;

          const orderOperations = [
            ...crud('order','Order'),
            op('change-status','changeOrderStatus','order',true,['orderReferenceId','nextStatus','reasonReference'],['orderReferenceId','nextStatus','reasonReference'],['orderReferenceId','reasonReference']),
            link('order','Order','customer'), link('order','Order','opportunity'), link('order','Order','brand'), link('order','Order','trademark'), link('order','Order','matter'),
            op('validate-readiness','validateOrderReadiness','order',false,['orderReferenceId'],['orderReferenceId'],['orderReferenceId']),
            op('accept','acceptOrder','order',true,['orderReferenceId','reasonReference'],['orderReferenceId','reasonReference'],['orderReferenceId','reasonReference']),
            op('cancel','cancelOrder','order',true,['orderReferenceId','reasonReference'],['orderReferenceId','reasonReference'],['orderReferenceId','reasonReference'])
          ] as const;

          const workflowOperations = [
            op('create','createWorkflowContract','workflow-contract',true,['objectRecord','publicReferenceRecord','sourceReference'],['objectRecord','publicReferenceRecord','sourceReference','metadata'],['sourceReference'],['objectRecord','publicReferenceRecord','metadata']),
            op('get','getWorkflowContract','workflow-contract',false,['workflowContractReferenceId'],['workflowContractReferenceId'],['workflowContractReferenceId']),
            op('update','updateWorkflowContract','workflow-contract',true,['workflowContractReferenceId'],['workflowContractReferenceId','metadata','reasonReference'],['workflowContractReferenceId','reasonReference'],['metadata']),
            op('change-status','changeWorkflowContractStatus','workflow-contract',true,['workflowContractReferenceId','nextStatus','reasonReference'],['workflowContractReferenceId','nextStatus','reasonReference'],['workflowContractReferenceId','reasonReference']),
            op('define-state','defineWorkflowState','workflow-contract',true,['workflowContractReferenceId','stateRecord'],['workflowContractReferenceId','stateRecord'],['workflowContractReferenceId'],['stateRecord']),
            op('define-transition','defineWorkflowTransition','workflow-contract',true,['workflowContractReferenceId','transitionRecord'],['workflowContractReferenceId','transitionRecord'],['workflowContractReferenceId'],['transitionRecord']),
            op('define-guard','defineWorkflowGuard','workflow-contract',true,['workflowContractReferenceId','guardRecord'],['workflowContractReferenceId','guardRecord'],['workflowContractReferenceId'],['guardRecord']),
            op('validate-transition','validateWorkflowTransition','workflow-contract',false,['workflowContractReferenceId','fromState','toState'],['workflowContractReferenceId','fromState','toState','context'],['workflowContractReferenceId'],['context']),
            op('validate-applicability','validateWorkflowApplicability','workflow-contract',false,['workflowContractReferenceId','targetReferenceId'],['workflowContractReferenceId','targetReferenceId','context'],['workflowContractReferenceId','targetReferenceId'],['context']),
            op('validate-reference','validateWorkflowContractReference','workflow-contract',false,['workflowContractReferenceId','requestingDomain','requestingService'],['workflowContractReferenceId','requestingDomain','requestingService'],['workflowContractReferenceId']),
            op('archive','archiveWorkflowContract','workflow-contract',true,['workflowContractReferenceId','reasonReference'],['workflowContractReferenceId','reasonReference'],['workflowContractReferenceId','reasonReference'])
          ] as const;

          const taskOperations = [
            ...crud('task','Task'),
            op('change-status','changeTaskStatus','task',true,['taskReferenceId','nextStatus','reasonReference'],['taskReferenceId','nextStatus','reasonReference'],['taskReferenceId','reasonReference']),
            op('assign','assignTask','task',true,['taskReferenceId','assigneeReferenceId','assigneeType'],['taskReferenceId','assigneeReferenceId','assigneeType','reasonReference'],['taskReferenceId','assigneeReferenceId','reasonReference']),
            op('reassign','reassignTask','task',true,['taskReferenceId','assigneeReferenceId','assigneeType','reasonReference'],['taskReferenceId','assigneeReferenceId','assigneeType','reasonReference'],['taskReferenceId','assigneeReferenceId','reasonReference']),
            op('unassign','unassignTask','task',true,['taskReferenceId','reasonReference'],['taskReferenceId','reasonReference'],['taskReferenceId','reasonReference']),
            link('task','Task','matter'), link('task','Task','workflow_contract'), link('task','Task','dependency'),
            op('complete','completeTask','task',true,['taskReferenceId','reasonReference'],['taskReferenceId','reasonReference','completionRecord'],['taskReferenceId','reasonReference'],['completionRecord']),
            op('cancel','cancelTask','task',true,['taskReferenceId','reasonReference'],['taskReferenceId','reasonReference'],['taskReferenceId','reasonReference']),
            op('reopen','reopenTask','task',true,['taskReferenceId','reasonReference'],['taskReferenceId','reasonReference'],['taskReferenceId','reasonReference']),
            op('archive','archiveTask','task',true,['taskReferenceId','reasonReference'],['taskReferenceId','reasonReference'],['taskReferenceId','reasonReference'])
          ] as const;

          const eventOperations = [
            op('record','recordEvent','event',true,['objectRecord','publicReferenceRecord','eventType','sourceService','subjectReferenceId','payload'],['objectRecord','publicReferenceRecord','eventType','sourceService','subjectReferenceId','correlationId','causationEventReferenceId','payload','schemaVersion'],['subjectReferenceId','causationEventReferenceId'],['objectRecord','publicReferenceRecord','payload']),
            op('get','getEvent','event',false,['eventReferenceId'],['eventReferenceId'],['eventReferenceId']),
            op('validate-reference','validateEventReference','event',false,['eventReferenceId','requestingDomain','requestingService'],['eventReferenceId','requestingDomain','requestingService'],['eventReferenceId']),
            op('validate-payload','validateEventPayload','event',false,['eventType','payload','schemaVersion'],['eventType','payload','schemaVersion'],[],['payload']),
            op('update-status','updateEventStatus','event',true,['eventReferenceId','nextStatus','reasonReference'],['eventReferenceId','nextStatus','reasonReference'],['eventReferenceId','reasonReference']),
            op('mark-dispatched','markEventDispatched','event',true,['eventReferenceId','dispatchReferenceId'],['eventReferenceId','dispatchReferenceId'],['eventReferenceId','dispatchReferenceId']),
            op('mark-dispatch-failed','markEventDispatchFailed','event',true,['eventReferenceId','reasonReference'],['eventReferenceId','reasonReference'],['eventReferenceId','reasonReference']),
            op('link-consumer','linkEventConsumer','event',true,['eventReferenceId','consumerReferenceId'],['eventReferenceId','consumerReferenceId'],['eventReferenceId','consumerReferenceId']),
            op('archive','archiveEvent','event',true,['eventReferenceId','reasonReference'],['eventReferenceId','reasonReference'],['eventReferenceId','reasonReference'])
          ] as const;

          const communicationOperations = [
            ...crud('communication','Communication'),
            op('change-status','changeCommunicationStatus','communication',true,['communicationReferenceId','nextStatus','reasonReference'],['communicationReferenceId','nextStatus','reasonReference'],['communicationReferenceId','reasonReference']),
            link('communication','Communication','participant'), link('communication','Communication','matter'), link('communication','Communication','customer'), link('communication','Communication','agent'), link('communication','Communication','attachment'), link('communication','Communication','document'),
            op('record-sent','recordCommunicationSent','communication',true,['communicationReferenceId','deliveryReferenceId'],['communicationReferenceId','deliveryReferenceId','reviewReferenceId'],['communicationReferenceId','deliveryReferenceId','reviewReferenceId']),
            op('record-received','recordCommunicationReceived','communication',true,['communicationReferenceId','sourceReference'],['communicationReferenceId','sourceReference'],['communicationReferenceId','sourceReference']),
            op('archive','archiveCommunication','communication',true,['communicationReferenceId','reasonReference'],['communicationReferenceId','reasonReference'],['communicationReferenceId','reasonReference'])
          ] as const;

          const specs = [
            ['matter','core-service-matter-service-contract',matterOperations],
            ['order','core-service-order-service-contract',orderOperations],
            ['workflow-contract','core-service-workflow-contract-service-contract',workflowOperations],
            ['task','core-service-task-service-contract',taskOperations],
            ['event','core-service-event-service-contract',eventOperations],
            ['communication','core-service-communication-service-contract',communicationOperations]
          ] as const;

          export const CORE_TASK_057C_API_BOUNDARY_SPECS = specs.map(([domainId, serviceContractId, operations]) => ({
            domainId,
            apiType: `${domainId}-api`,
            apiContractId: `core-api-${domainId}-api-contract`,
            serviceContractId,
            sourcePath: `books/book-02-core-specification/core-specs/contracts/api/${domainId}-api-contract.md`,
            implementationTask: 'CORE-TASK-057C',
            directDomainMutation: false,
            directEventEmission: false,
            operations
          })) as readonly CoreGovernedApiBoundarySpec[];
          EOF

          python - <<'PY'
          from pathlib import Path
          import json

          p=Path('src/api/core-governed-api-boundary.ts'); s=p.read_text(); s=s.replace("'CORE-TASK-057A' | 'CORE-TASK-057B'", "'CORE-TASK-057A' | 'CORE-TASK-057B' | 'CORE-TASK-057C'"); p.write_text(s)
          p=Path('src/api/index.ts'); s=p.read_text();
          if "core-governed-api-specs-057c" not in s: s += "export * from './core-governed-api-specs-057c.ts';\n"
          p.write_text(s)

          p=Path('src/api-coverage/core-api-boundary-evidence.ts'); s=p.read_text()
          s=s.replace('CORE_TASK_057B_API_BOUNDARY_SPECS,', 'CORE_TASK_057B_API_BOUNDARY_SPECS,\n  CORE_TASK_057C_API_BOUNDARY_SPECS,')
          s=s.replace("'CORE-TASK-057A' | 'CORE-TASK-057B'", "'CORE-TASK-057A' | 'CORE-TASK-057B' | 'CORE-TASK-057C'")
          s=s.replace("'src/api/core-governed-api-specs.ts',", "'src/api/core-governed-api-specs.ts',\n  'src/api/core-governed-api-specs-057c.ts',")
          s=s.replace("`tests/unit/core-task-${implementationTask === 'CORE-TASK-057A' ? '057a' : '057b'}-api-boundary-foundation.test.ts`", "`tests/unit/core-task-${implementationTask === 'CORE-TASK-057A' ? '057a' : implementationTask === 'CORE-TASK-057B' ? '057b' : '057c'}-api-boundary-foundation.test.ts`")
          s=s.replace("`fixtures/api/core-task-${implementationTask === 'CORE-TASK-057A' ? '057a' : '057b'}-api-boundaries.fixture.json`", "`fixtures/api/core-task-${implementationTask === 'CORE-TASK-057A' ? '057a' : implementationTask === 'CORE-TASK-057B' ? '057b' : '057c'}-api-boundaries.fixture.json`")
          marker="export const CORE_API_BOUNDARY_EVIDENCE = [\n  ...CORE_TASK_057A_API_BOUNDARY_EVIDENCE,\n  ...CORE_TASK_057B_API_BOUNDARY_EVIDENCE"
          addition="export const CORE_TASK_057C_API_BOUNDARY_EVIDENCE = evidenceFor(\n  CORE_TASK_057C_API_BOUNDARY_SPECS,\n  'CORE-TASK-057C'\n);\n\nexport const CORE_API_BOUNDARY_EVIDENCE = [\n  ...CORE_TASK_057A_API_BOUNDARY_EVIDENCE,\n  ...CORE_TASK_057B_API_BOUNDARY_EVIDENCE,\n  ...CORE_TASK_057C_API_BOUNDARY_EVIDENCE"
          s=s.replace(marker,addition); p.write_text(s)

          p=Path('src/api-coverage/core-api-boundary-validation.ts'); s=p.read_text()
          s=s.replace('CORE_GOVERNED_API_BOUNDARY_SPECS,', 'CORE_GOVERNED_API_BOUNDARY_SPECS,\n  CORE_TASK_057C_API_BOUNDARY_SPECS,')
          s=s.replace("  'evidence'\n] as const;", "  'evidence',\n  'matter',\n  'order',\n  'workflow-contract',\n  'task',\n  'event',\n  'communication'\n] as const;")
          s=s.replace('...validateCoreGovernedApiBoundarySpecs(CORE_GOVERNED_API_BOUNDARY_SPECS)', '...validateCoreGovernedApiBoundarySpecs([...CORE_GOVERNED_API_BOUNDARY_SPECS, ...CORE_TASK_057C_API_BOUNDARY_SPECS])')
          s=s.replace('const spec = CORE_GOVERNED_API_BOUNDARY_SPECS.find(', 'const spec = [...CORE_GOVERNED_API_BOUNDARY_SPECS, ...CORE_TASK_057C_API_BOUNDARY_SPECS].find(')
          s=s.replace('exactly twelve completed API entries', 'exactly eighteen completed API entries'); p.write_text(s)

          p=Path('src/validation/core-fixture-manifest.ts'); s=p.read_text()
          s=s.replace("  'core_task_057b_api_boundaries',", "  'core_task_057b_api_boundaries',\n  'core_task_057c_api_boundaries',")
          marker="  {\n    id: 'core-task-057b-api-boundaries',\n    type: 'core_task_057b_api_boundaries',\n    path: 'fixtures/api/core-task-057b-api-boundaries.fixture.json',\n    required: true\n  },"
          addition=marker+"\n  {\n    id: 'core-task-057c-api-boundaries',\n    type: 'core_task_057c_api_boundaries',\n    path: 'fixtures/api/core-task-057c-api-boundaries.fixture.json',\n    required: true\n  },"
          s=s.replace(marker,addition); p.write_text(s)

          p=Path('scripts/validate-core-fixtures.mjs'); s=p.read_text(); marker='  core_task_057b_api_boundaries: validateCoreApiBoundaryFixture,\n';
          if 'core_task_057c_api_boundaries' not in s: s=s.replace(marker,marker+'  core_task_057c_api_boundaries: validateCoreApiBoundaryFixture,\n')
          p.write_text(s)

          data=json.loads(Path('package.json').read_text()); extra=['src/api/core-governed-api-specs-057c.ts','fixtures/api/core-task-057c-api-boundaries.fixture.json','tests/fixtures/core-task-057c-api-boundaries-fixture.test.ts','tests/unit/core-task-057c-api-boundary-foundation.test.ts','tests/unit/core-task-057c-book-02-api-evidence.test.ts','docs/architecture/core-task-057c-final-api-boundaries.md']; fmt=data['scripts']['format'];
          for x in extra:
              if x not in fmt.split(): fmt += ' '+x
          data['scripts']['format']=fmt; Path('package.json').write_text(json.dumps(data,indent=2)+'\n')
          PY

          cat > tests/fixtures/core-task-057c-api-boundaries-fixture.test.ts <<'EOF'
          import assert from 'node:assert/strict';
          import { readFile } from 'node:fs/promises';
          import { describe, it } from 'node:test';
          import { CORE_TASK_057C_API_BOUNDARY_EVIDENCE, validateCoreApiBoundaryFixture } from '../../src/index.ts';
          describe('CORE-TASK-057C API fixture', () => {
            it('matches all six final API evidence records', async () => {
              const fixture = JSON.parse(await readFile('fixtures/api/core-task-057c-api-boundaries.fixture.json','utf8'));
              assert.deepEqual(fixture, CORE_TASK_057C_API_BOUNDARY_EVIDENCE);
              assert.equal(validateCoreApiBoundaryFixture(fixture).ok, true);
            });
          });
          EOF

          cat > tests/unit/core-task-057c-api-boundary-foundation.test.ts <<'EOF'
          import assert from 'node:assert/strict';
          import { describe, it } from 'node:test';
          import { CORE_TASK_057C_API_BOUNDARY_SPECS, CORE_TASK_057C_API_BOUNDARY_EVIDENCE, CORE_GOVERNED_API_REQUIRED_CAPABILITIES, validateCoreGovernedApiBoundarySpecs, validateCoreApiBoundaryEvidence } from '../../src/index.ts';
          describe('CORE-TASK-057C final API boundaries', () => {
            it('locks six owning-Service boundaries and prohibits mutation and emission', () => {
              assert.deepEqual(validateCoreGovernedApiBoundarySpecs(CORE_TASK_057C_API_BOUNDARY_SPECS), []);
              assert.deepEqual(validateCoreApiBoundaryEvidence(), []);
              assert.equal(CORE_TASK_057C_API_BOUNDARY_SPECS.length, 6);
              assert.equal(CORE_TASK_057C_API_BOUNDARY_EVIDENCE.length, 6);
              for (const entry of CORE_TASK_057C_API_BOUNDARY_EVIDENCE) {
                assert.deepEqual(entry.provenCapabilities, CORE_GOVERNED_API_REQUIRED_CAPABILITIES);
                assert.equal(entry.directDomainMutation, false);
                assert.equal(entry.directEventEmission, false);
                assert.ok(entry.operationCount >= 9);
              }
            });
            it('keeps Event references non-command and high-risk boundaries explicit', () => {
              const event = CORE_TASK_057C_API_BOUNDARY_SPECS.find((entry) => entry.domainId === 'event')!;
              assert.equal(event.operations.some((entry) => /execute|command|trigger/.test(entry.apiOperation)), false);
              const workflow = CORE_TASK_057C_API_BOUNDARY_SPECS.find((entry) => entry.domainId === 'workflow-contract')!;
              assert.equal(workflow.operations.some((entry) => entry.apiOperation === 'execute'), false);
              const communication = CORE_TASK_057C_API_BOUNDARY_SPECS.find((entry) => entry.domainId === 'communication')!;
              assert.equal(communication.operations.some((entry) => entry.apiOperation === 'send'), false);
            });
          });
          EOF

          cat > tests/unit/core-task-057c-book-02-api-evidence.test.ts <<'EOF'
          import assert from 'node:assert/strict';
          import { describe, it } from 'node:test';
          import { BOOK_02_MVP_GAP_BASELINE } from '../../src/index.ts';
          describe('CORE-TASK-057C Book 02 API closure', () => {
            it('closes all API requirements and direct-emission acceptance', () => {
              const api = BOOK_02_MVP_GAP_BASELINE.requirements.filter((entry) => entry.layer === 'api' && entry.category === 'must_build_now');
              assert.equal(api.length, 18);
              assert.equal(api.every((entry) => entry.currentDisposition === 'meets_required_depth'), true);
              assert.equal(BOOK_02_MVP_GAP_BASELINE.acceptanceCriteria.find((entry) => entry.id === 'must-build-api-validators-exist')?.satisfied, true);
              assert.equal(BOOK_02_MVP_GAP_BASELINE.acceptanceCriteria.find((entry) => entry.id === 'api-layer-does-not-emit-events-directly')?.satisfied, true);
              assert.equal(BOOK_02_MVP_GAP_BASELINE.summary.acceptance.book02MvpComplete, false);
            });
          });
          EOF

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm install --global pnpm@10
          pnpm install --frozen-lockfile

      - name: Generate fixtures and migrate baselines
        shell: bash
        run: |
          cat > .generate-057c-api.mjs <<'EOF'
          import { writeFileSync } from 'node:fs';
          import { CORE_TASK_057C_API_BOUNDARY_EVIDENCE } from './src/index.ts';
          writeFileSync('fixtures/api/core-task-057c-api-boundaries.fixture.json', JSON.stringify(CORE_TASK_057C_API_BOUNDARY_EVIDENCE,null,2)+'\n');
          EOF
          pnpm exec tsx .generate-057c-api.mjs
          rm .generate-057c-api.mjs
          cat > .generate-057c-baseline.mjs <<'EOF'
          import { writeFileSync } from 'node:fs';
          import { BOOK_02_MVP_GAP_BASELINE, BOOK_02_POST_SERVICE_COMPLETION_AUDIT } from './src/index.ts';
          writeFileSync('fixtures/mvp-coverage/book-02-mvp-gap-baseline.fixture.json',JSON.stringify(BOOK_02_MVP_GAP_BASELINE,null,2)+'\n');
          writeFileSync('fixtures/mvp-coverage/book-02-post-service-completion-audit.fixture.json',JSON.stringify(BOOK_02_POST_SERVICE_COMPLETION_AUDIT,null,2)+'\n');
          EOF
          pnpm exec tsx .generate-057c-baseline.mjs
          rm .generate-057c-baseline.mjs
          python - <<'PY'
          from pathlib import Path
          for p in Path('tests/unit').glob('*.test.ts'):
              s=p.read_text(); o=s
              s=s.replace('80 / 3 / 27','86 / 3 / 21').replace('meets_required_depth: 80','meets_required_depth: 86').replace('validated_skeleton_only: 27','validated_skeleton_only: 21')
              s=s.replace('remaining 35 unresolved','remaining 29 unresolved').replace('audit.unresolvedInventory.total, 35','audit.unresolvedInventory.total, 29').replace("api: 6,\n",'')
              s=s.replace("'CORE-TASK-057C'", "'CORE-TASK-058A'") if p.name in {'core-task-055-post-service-completion-audit.test.ts','core-task-056-book-02-event-evidence.test.ts'} else s
              s=s.replace('\n      17\n','\n      11\n').replace('[0, 7, 4, 6, 0]','[0, 1, 4, 6, 0]')
              if p.name=='core-fixture-manifest.test.ts':
                  s=s.replace("it('has exactly 50 entries'", "it('has exactly 51 entries'").replace('CORE_FIXTURE_MANIFEST.length, 50','CORE_FIXTURE_MANIFEST.length, 51')
                  marker="      'core_task_057b_api_boundaries',\n"
                  if "'core_task_057c_api_boundaries'" not in s: s=s.replace(marker,marker+"      'core_task_057c_api_boundaries',\n")
              if p.name=='book-02-mvp-gap-baseline.test.ts':
                  s=s.replace("const apiGap =", "const workflowGap =").replace("must-api-matter-api-contract", "must-workflow-customer-intake-workflow")
              if s!=o: p.write_text(s)
          PY
          pnpm exec tsx .generate-057c-baseline.mjs

      - name: Validate repository
        run: |
          pnpm format
          pnpm typecheck
          pnpm lint
          pnpm format:check
          pnpm validate:fixtures
          pnpm test
          pnpm coverage:contracts
          pnpm gaps:contracts
          pnpm acceptance:contracts
          pnpm coverage:behavior
          pnpm gaps:behavior
          pnpm acceptance:behavior
          pnpm gaps:mvp

      - name: Publish clean commit
        shell: bash
        run: |
          rm -f .github/workflows/core-task-057c-finalize.yml
          git config user.name 'MarkOrbit Automation'
          git config user.email 'automation@markorbit.local'
          git add -A
          git commit -m 'feat(core): implement CORE-TASK-057C final API boundaries'
          git push --force origin HEAD:agent/core-task-057c-final-api-boundaries
