name: CORE-TASK-042B Diagnostics

on:
  pull_request:

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Capture typecheck
        shell: bash
        run: |
          set +e
          pnpm typecheck > typecheck.log 2>&1
          echo $? > typecheck.exit
          tar --exclude=.git --exclude=node_modules -czf markorbit-core-source.tar.gz .
          exit 0

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: core-task-042b-diagnostics
          path: |
            typecheck.log
            typecheck.exit
            markorbit-core-source.tar.gz
