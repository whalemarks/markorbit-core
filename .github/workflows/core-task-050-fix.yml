name: CORE-TASK-050 Fix Historical Assertions

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix-and-validate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Update historical assertions
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              'tests/unit/book-02-mvp-gap-baseline.test.ts': [
                  (
                      "(r: Record<string, unknown>) => r.layer === 'service',",
                      "(r: Record<string, unknown>) =>\n          r.layer === 'service' &&\n          r.currentDisposition === 'validated_skeleton_only',",
                  )
              ],
              'tests/unit/core-task-039-book-02-service-evidence.test.ts': [
                  (
                      "implemented.slice(0, task039ServiceIds.length).map((entry) => entry.id),",
                      "implemented\n        .map((entry) => entry.id)\n        .filter((id) => task039ServiceIds.includes(id)),",
                  )
              ],
              'tests/unit/core-task-040-book-02-service-evidence.test.ts': [
                  (
                      "implemented.slice(0, task040ServiceIds.length).map((entry) => entry.id),",
                      "implemented\n        .map((entry) => entry.id)\n        .filter((id) => task040ServiceIds.includes(id)),",
                  )
              ],
              'tests/unit/core-task-041-book-02-service-evidence.test.ts': [
                  (
                      "implemented\n        .slice(0, implementedServiceIds.length)\n        .map((requirement) => requirement.id),",
                      "implemented\n        .map((requirement) => requirement.id)\n        .filter((id) => implementedServiceIds.includes(id)),",
                  )
              ],
          }
          for filename, file_replacements in replacements.items():
              path = Path(filename)
              text = path.read_text()
              for old, new in file_replacements:
                  if old not in text:
                      raise SystemExit(f'Expected text not found in {filename}: {old}')
                  text = text.replace(old, new, 1)
              path.write_text(text)
          PY
          rm -f CORE-TASK-050-TEST-DIAGNOSTICS.md
          rm -f .github/workflows/core-task-050-fix.yml

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm format
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm validate:fixtures

      - name: Test
        id: full_tests
        continue-on-error: true
        run: pnpm test > /tmp/core-task-050-test.log 2>&1

      - name: Publish remaining diagnostics
        if: steps.full_tests.outcome == 'failure'
        shell: bash
        run: |
          {
            echo '# CORE-TASK-050 full-suite failure'
            echo
            echo '```text'
            grep -E -B 4 -A 10 'not ok|failureType|ERR_ASSERTION|expected:|actual:|# fail' /tmp/core-task-050-test.log | tail -n 260
            echo '```'
          } > CORE-TASK-050-TEST-DIAGNOSTICS.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "CORE-TASK-050 — update test diagnostics"
          git push --force origin HEAD:agent/core-task-050-identity-service-authority-foundation
          exit 1

      - if: steps.full_tests.outcome == 'success'
        run: pnpm coverage:contracts
      - if: steps.full_tests.outcome == 'success'
        run: pnpm gaps:contracts
      - if: steps.full_tests.outcome == 'success'
        run: pnpm acceptance:contracts
      - if: steps.full_tests.outcome == 'success'
        run: pnpm coverage:behavior
      - if: steps.full_tests.outcome == 'success'
        run: pnpm gaps:behavior
      - if: steps.full_tests.outcome == 'success'
        run: pnpm acceptance:behavior
      - if: steps.full_tests.outcome == 'success'
        run: pnpm gaps:mvp

      - name: Commit validated fixes
        if: steps.full_tests.outcome == 'success'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "CORE-TASK-050 — align historical baseline assertions"
          git push --force origin HEAD:agent/core-task-050-identity-service-authority-foundation
