name: CORE-TASK-057B Test Diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/core-task-057b-test-diagnostic.yml'
      - '_automation/core-task-057b/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: agent/core-task-057b-domain-api-boundaries-v2
          fetch-depth: 0

      - name: Apply implementation and migrations
        shell: bash
        run: |
          base64 --decode _automation/core-task-057b/implementation.patch.gz.b64 > /tmp/core-task-057b.patch.gz
          gzip --test /tmp/core-task-057b.patch.gz
          gzip --decompress --stdout /tmp/core-task-057b.patch.gz > /tmp/core-task-057b.patch
          git apply --check /tmp/core-task-057b.patch
          git apply /tmp/core-task-057b.patch
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/validate-core-fixtures.mjs')
          text = path.read_text()
          marker = '  core_task_057a_api_boundaries: validateCoreApiBoundaryFixture,\n'
          if 'core_task_057b_api_boundaries' not in text:
              text = text.replace(marker, marker + '  core_task_057b_api_boundaries: validateCoreApiBoundaryFixture,\n')
              path.write_text(text)
          for path in Path('tests/unit').glob('*.test.ts'):
              text = path.read_text()
              original = text
              text = text.replace('73 / 3 / 34', '80 / 3 / 27')
              text = text.replace('meets_required_depth: 73', 'meets_required_depth: 80')
              text = text.replace('validated_skeleton_only: 34', 'validated_skeleton_only: 27')
              if path.name in {'core-task-055-post-service-completion-audit.test.ts','core-task-056-book-02-event-evidence.test.ts'}:
                  text = text.replace('remaining 42 unresolved', 'remaining 35 unresolved')
                  text = text.replace('audit.unresolvedInventory.total, 42', 'audit.unresolvedInventory.total, 35')
                  text = text.replace('api: 13', 'api: 6')
                  text = text.replace("audit.nextTask, 'CORE-TASK-057B'", "audit.nextTask, 'CORE-TASK-057C'")
                  text = text.replace('[0, 14, 4, 6, 0]', '[0, 7, 4, 6, 0]')
                  text = text.replace('        24\n', '        17\n')
                  text = text.replace(', 42);', ', 35);')
              if path.name == 'book-02-mvp-gap-baseline.test.ts':
                  text = text.replace('must-api-customer-api-contract', 'must-api-agent-api-contract')
              if text != original:
                  path.write_text(text)
          PY

      - name: Add formal evidence tests
        shell: bash
        run: |
          cat > tests/fixtures/core-task-057b-api-boundaries-fixture.test.ts <<'EOF'
          import assert from 'node:assert/strict';
          import { readFile } from 'node:fs/promises';
          import { describe, it } from 'node:test';
          import { CORE_API_BOUNDARY_EVIDENCE, validateCoreApiBoundaryFixture } from '../../src/index.ts';
          const domainIds = new Set(['customer','brand','trademark','jurisdiction','classification','document','evidence']);
          describe('CORE-TASK-057B API boundary fixture', () => {
            it('matches deterministic source evidence and validates cleanly', async () => {
              const fixture = JSON.parse(await readFile('fixtures/api/core-task-057b-api-boundaries.fixture.json','utf8'));
              const expected = CORE_API_BOUNDARY_EVIDENCE.filter((entry) => domainIds.has(entry.domainId));
              assert.deepEqual(fixture, expected);
              assert.equal(validateCoreApiBoundaryFixture(fixture).ok, true);
            });
          });
          EOF
          cat > tests/unit/core-task-057b-api-boundary-foundation.test.ts <<'EOF'
          import assert from 'node:assert/strict';
          import { describe, it } from 'node:test';
          import { CORE_API_BOUNDARY_EVIDENCE, CORE_GOVERNED_API_REQUIRED_CAPABILITIES, validateCoreApiBoundaryEvidence } from '../../src/index.ts';
          const domainIds = new Set(['customer','brand','trademark','jurisdiction','classification','document','evidence']);
          describe('CORE-TASK-057B governed API boundaries', () => {
            it('locks seven executable API boundaries with owning-Service delegation', () => {
              assert.deepEqual(validateCoreApiBoundaryEvidence(), []);
              const evidence = CORE_API_BOUNDARY_EVIDENCE.filter((entry) => domainIds.has(entry.domainId));
              assert.equal(evidence.length, 7);
              for (const entry of evidence) {
                assert.equal(entry.currentDepth, 'level_2');
                assert.deepEqual(entry.provenCapabilities, CORE_GOVERNED_API_REQUIRED_CAPABILITIES);
                assert.deepEqual(entry.unresolvedCapabilities, []);
                assert.equal(entry.directDomainMutation, false);
                assert.equal(entry.directEventEmission, false);
              }
            });
          });
          EOF
          cat > tests/unit/core-task-057b-book-02-api-evidence.test.ts <<'EOF'
          import assert from 'node:assert/strict';
          import { describe, it } from 'node:test';
          import { BOOK_02_MVP_GAP_BASELINE } from '../../src/index.ts';
          const requirementIds = ['must-api-customer-api-contract','must-api-brand-api-contract','must-api-trademark-api-contract','must-api-jurisdiction-api-contract','must-api-classification-api-contract','must-api-document-api-contract','must-api-evidence-api-contract'];
          describe('CORE-TASK-057B Book 02 API evidence', () => {
            it('promotes seven APIs without claiming all-API completion', () => {
              const requirements = requirementIds.map((id) => BOOK_02_MVP_GAP_BASELINE.requirements.find((requirement) => requirement.id === id));
              assert.equal(requirements.every(Boolean), true);
              assert.equal(requirements.every((requirement) => requirement?.currentDisposition === 'meets_required_depth'), true);
              assert.equal(BOOK_02_MVP_GAP_BASELINE.summary.mustBuildNow.meets_required_depth, 80);
              assert.equal(BOOK_02_MVP_GAP_BASELINE.summary.mustBuildNow.validated_skeleton_only, 27);
              assert.equal(BOOK_02_MVP_GAP_BASELINE.summary.acceptance.book02MvpComplete, false);
            });
          });
          EOF

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm install --global pnpm@10
          pnpm install --frozen-lockfile

      - name: Regenerate canonical fixtures
        shell: bash
        run: |
          cat > .core-task-057b-generate.mjs <<'EOF'
          import { writeFileSync } from 'node:fs';
          import { CORE_API_BOUNDARY_EVIDENCE, BOOK_02_MVP_GAP_BASELINE, BOOK_02_POST_SERVICE_COMPLETION_AUDIT } from './src/index.ts';
          const domainIds = new Set(['customer','brand','trademark','jurisdiction','classification','document','evidence']);
          writeFileSync('fixtures/api/core-task-057a-api-boundaries.fixture.json', JSON.stringify(CORE_API_BOUNDARY_EVIDENCE, null, 2) + '\n');
          writeFileSync('fixtures/api/core-task-057b-api-boundaries.fixture.json', JSON.stringify(CORE_API_BOUNDARY_EVIDENCE.filter((entry) => domainIds.has(entry.domainId)), null, 2) + '\n');
          writeFileSync('fixtures/mvp-coverage/book-02-mvp-gap-baseline.fixture.json', JSON.stringify(BOOK_02_MVP_GAP_BASELINE, null, 2) + '\n');
          writeFileSync('fixtures/mvp-coverage/book-02-post-service-completion-audit.fixture.json', JSON.stringify(BOOK_02_POST_SERVICE_COMPLETION_AUDIT, null, 2) + '\n');
          EOF
          pnpm exec tsx .core-task-057b-generate.mjs
          rm .core-task-057b-generate.mjs

      - name: Format
        run: pnpm format

      - name: Capture tests
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          pnpm test 2>&1 | tee /tmp/core-task-057b-tests.log
          status=${PIPESTATUS[0]}
          {
            grep -nE 'not ok|FAIL|AssertionError|ERR_|error:|Expected|actual|expected' /tmp/core-task-057b-tests.log | tail -n 300 || true
            echo '--- tail ---'
            tail -n 400 /tmp/core-task-057b-tests.log
          } > /tmp/core-task-057b-test-failure.txt
          exit "$status"

      - name: Upload test failure
        uses: actions/upload-artifact@v4
        with:
          name: core-task-057b-test-failure
          path: /tmp/core-task-057b-test-failure.txt
          if-no-files-found: error
          retention-days: 1

      - name: Enforce diagnostic result
        if: steps.tests.outcome == 'failure'
        run: exit 1
