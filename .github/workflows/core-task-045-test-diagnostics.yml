name: CORE-TASK-045 Test Diagnostics

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/core-task-045-opportunity-service-foundation

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/core-task-045-opportunity-service-foundation
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Capture failure context
        shell: bash
        run: |
          set +e
          timeout 600s node scripts/run-tests.mjs > /tmp/core-task-045-test.log 2>&1
          code=$?
          {
            echo "exit_code=$code"
            echo "--- not ok context ---"
            grep -n -B 30 -A 80 'not ok' /tmp/core-task-045-test.log || true
            echo "--- assertion context ---"
            grep -n -B 15 -A 50 -E 'failureType|AssertionError|ERR_ASSERTION|actual:|expected:' /tmp/core-task-045-test.log || true
            echo "--- summary ---"
            tail -n 20 /tmp/core-task-045-test.log
          } > .core-task-045-test-diagnostics.txt
          exit 0
      - name: Commit diagnostics
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .core-task-045-test-diagnostics.txt
          git commit -m 'CORE-TASK-045 — capture failure context'
          git push origin HEAD:agent/core-task-045-opportunity-service-foundation
