name: CORE-TASK-040 Diagnose

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/core-task-040-trigger'
      - '.github/workflows/core-task-040-diagnose.yml'

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Capture tests
        shell: bash
        run: |
          set +e
          pnpm test > tests.log 2>&1
          status=$?
          cat tests.log
          echo "TEST_STATUS=$status" >> "$GITHUB_ENV"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: core-task-040-tests
          path: tests.log
      - name: Fail if tests failed
        run: test "$TEST_STATUS" = "0"
