name: CORE-TASK-040 Diagnose

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/core-task-040-trigger'
      - '.github/workflows/core-task-040-diagnose.yml'

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Capture fixture validation
        shell: bash
        run: |
          set +e
          pnpm validate:fixtures > fixtures.log 2>&1
          status=$?
          cat fixtures.log
          echo "FIXTURE_STATUS=$status" >> "$GITHUB_ENV"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: core-task-040-fixtures
          path: fixtures.log
      - name: Fail if fixtures failed
        run: test "$FIXTURE_STATUS" = "0"
