name: CORE-TASK-044 Apply

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/core-task-044-order-service-foundation

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/core-task-044-order-service-foundation
          fetch-depth: 0
      - name: Verify payload part 1
        run: |
          base64 -d .core-task-044-payload/part1.b64 > /tmp/part1.bin
          echo 'b60fe58efff8a0938cc5639c94f7706a4666f9a16c3f61c1370fe7cc96db4da6  /tmp/part1.bin' | sha256sum -c -
      - name: Verify payload part 2
        run: |
          cat \
            .core-task-044-payload/part2-0.bin \
            .core-task-044-payload/part2-1.bin \
            .core-task-044-payload/part2-2.bin \
            .core-task-044-payload/part2-3.bin \
            .core-task-044-payload/part2-4.bin \
            > /tmp/part2.bin
          echo 'b4053435a85b4f0b14ee508c7646b9f32f925d6d0aff199c2be2abf0ba33966d  /tmp/part2.bin' | sha256sum -c -
      - name: Verify payload part 3
        run: |
          cat \
            .core-task-044-payload/part3a0.bin \
            .core-task-044-payload/part3a1.bin \
            .core-task-044-payload/part3a2.bin \
            .core-task-044-payload/part3a3.bin \
            .core-task-044-payload/part3a4.bin \
            .core-task-044-payload/part3a5.bin \
            .core-task-044-payload/part3a6.bin \
            .core-task-044-payload/part3a7.bin \
            .core-task-044-payload/part3b.bin \
            .core-task-044-payload/part3c.bin \
            .core-task-044-payload/part3d.bin \
            .core-task-044-payload/part3e.bin \
            > /tmp/part3.bin
          echo 'cdb3741267f5192038c2ccba9e0d307050a06ccf6779bb82bb80c864f4895832  /tmp/part3.bin' | sha256sum -c -
      - name: Verify payload part 4
        run: |
          cat \
            .core-task-044-payload/part4-0.bin \
            .core-task-044-payload/part4-1.bin \
            .core-task-044-payload/part4-2.bin \
            .core-task-044-payload/part4-3.bin \
            .core-task-044-payload/part4-4.bin \
            > /tmp/part4.bin
          echo '36eafdc18edfa9e773fcb36eb894a718ad7e9c9bdc032bbe7960f0286ef83948  /tmp/part4.bin' | sha256sum -c -
      - name: Apply validated payload
        run: |
          cat /tmp/part1.bin /tmp/part2.bin /tmp/part3.bin /tmp/part4.bin > /tmp/core-task-044-payload.tgz
          echo '8010a36debd895632c6deae964dd30ace71d72a299caee714396ff235424e3c4  /tmp/core-task-044-payload.tgz' | sha256sum -c -
          tar -xzf /tmp/core-task-044-payload.tgz -C .
          rm -rf .core-task-044-payload
          rm -f .github/workflows/core-task-044-workspace.yml
          rm -f .github/workflows/core-task-044-apply.yml
      - name: Commit implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'CORE-TASK-044 — implement Order Service commercial-request foundation'
          git push origin HEAD:agent/core-task-044-order-service-foundation
