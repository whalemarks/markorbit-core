name: CORE-TASK-044 Apply

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/core-task-044-order-service-foundation

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/core-task-044-order-service-foundation
          fetch-depth: 0
      - name: Reassemble validated payload
        shell: bash
        run: |
          base64 -d .core-task-044-payload/part1.b64 > /tmp/core-task-044-payload.tgz
          base64 -d .core-task-044-payload/part2.b64 >> /tmp/core-task-044-payload.tgz
          cat \
            .core-task-044-payload/part3a.bin \
            .core-task-044-payload/part3b.bin \
            .core-task-044-payload/part3c.bin \
            .core-task-044-payload/part3d.bin \
            .core-task-044-payload/part3e.bin \
            >> /tmp/core-task-044-payload.tgz
          base64 -d .core-task-044-payload/part4.b64 >> /tmp/core-task-044-payload.tgz
          echo '8010a36debd895632c6deae964dd30ace71d72a299caee714396ff235424e3c4  /tmp/core-task-044-payload.tgz' | sha256sum -c -
          tar -xzf /tmp/core-task-044-payload.tgz -C .
          rm -rf .core-task-044-payload
          rm -f .github/workflows/core-task-044-workspace.yml
          rm -f .github/workflows/core-task-044-apply.yml
      - name: Commit implementation
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'CORE-TASK-044 — implement Order Service commercial-request foundation'
          git push origin HEAD:agent/core-task-044-order-service-foundation
