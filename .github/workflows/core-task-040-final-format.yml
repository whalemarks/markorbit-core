name: CORE-TASK-040 Final Format

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/core-task-040-final-format.mjs'
      - '.github/workflows/core-task-040-final-format.yml'

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: node scripts/core-task-040-final-format.mjs
      - run: pnpm format
      - name: Remove one-time formatter and commit
        run: |
          git rm scripts/core-task-040-final-format.mjs .github/workflows/core-task-040-final-format.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'CORE-TASK-040 — Finalize governed formatting'
          git push
