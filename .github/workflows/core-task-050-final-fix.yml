name: CORE-TASK-050 Final Baseline Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix-and-validate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Update Identity evidence expectation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/unit/book-02-mvp-gap-baseline.test.ts')
          text = path.read_text()
          old = """assert.deepEqual(service?.implementationFiles, [
      'src/contracts/service/core-service-contract-skeletons.ts'
    ]);"""
          new = """assert.deepEqual(service?.implementationFiles, [
      'src/contracts/service/core-service-contract-skeletons.ts',
      'src/services/identity/core-identity-service.ts'
    ]);"""
          if old not in text:
              raise SystemExit('Expected Identity implementation evidence assertion not found.')
          path.write_text(text.replace(old, new, 1))
          PY
          rm -f CORE-TASK-050-TEST-DIAGNOSTICS.md
          rm -f .github/workflows/core-task-050-final-fix.yml

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm validate:fixtures
      - run: pnpm test
      - run: pnpm coverage:contracts
      - run: pnpm gaps:contracts
      - run: pnpm acceptance:contracts
      - run: pnpm coverage:behavior
      - run: pnpm gaps:behavior
      - run: pnpm acceptance:behavior
      - run: pnpm gaps:mvp

      - name: Commit validated final fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "CORE-TASK-050 — finalize Identity Service evidence assertions"
          git push --force origin HEAD:agent/core-task-050-identity-service-authority-foundation

