name: CORE-TASK-042B Format Governance

on:
  pull_request:

permissions:
  contents: write

jobs:
  update-format-governance:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - name: Add completed Evidence files to formatting governance
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import json

          path = Path('package.json')
          package = json.loads(path.read_text())
          governed_files = [
              'docs/architecture/core-evidence-service-mvp-completion.md',
              'src/services/evidence/core-evidence-service-complete.ts',
              'tests/unit/core-evidence-service-mvp-completion.test.ts',
          ]

          for script_name in ('format', 'format:check'):
              tokens = package['scripts'][script_name].split()
              for governed_file in governed_files:
                  if governed_file not in tokens:
                      tokens.append(governed_file)
              package['scripts'][script_name] = ' '.join(tokens)

          path.write_text(json.dumps(package, indent=2) + '\n')
          PY

          pnpm exec prettier --write \
            package.json \
            docs/architecture/core-evidence-service-mvp-completion.md \
            src/services/evidence/core-evidence-service-complete.ts \
            tests/unit/core-evidence-service-mvp-completion.test.ts

      - name: Commit formatting governance
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json \
            docs/architecture/core-evidence-service-mvp-completion.md \
            src/services/evidence/core-evidence-service-complete.ts \
            tests/unit/core-evidence-service-mvp-completion.test.ts
          git commit -m "CORE-TASK-042B — govern new Evidence formatting"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
