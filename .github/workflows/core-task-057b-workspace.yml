name: CORE-TASK-057B Apply and Validate

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/core-task-057b-workspace.yml'
      - '_automation/core-task-057b/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-validate-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: agent/core-task-057b-domain-api-boundaries-v2
          fetch-depth: 0

      - name: Decode and apply implementation patch
        shell: bash
        run: |
          base64 --decode _automation/core-task-057b/implementation.patch.gz.b64 > /tmp/core-task-057b.patch.gz
          gzip --test /tmp/core-task-057b.patch.gz
          gzip --decompress --stdout /tmp/core-task-057b.patch.gz > /tmp/core-task-057b.patch
          git apply --check /tmp/core-task-057b.patch
          git apply /tmp/core-task-057b.patch
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/validate-core-fixtures.mjs')
          text = path.read_text()
          marker = '  core_task_057a_api_boundaries: validateCoreApiBoundaryFixture,\n'
          registration = marker + '  core_task_057b_api_boundaries: validateCoreApiBoundaryFixture,\n'
          if 'core_task_057b_api_boundaries' not in text:
              if marker not in text:
                  raise SystemExit('CORE-TASK-057A validator marker not found')
              text = text.replace(marker, registration)
              path.write_text(text)
          PY

      - name: Migrate historical Book 02 assertions
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          for path in Path('tests/unit').glob('*.test.ts'):
              text = path.read_text()
              original = text
              text = text.replace('73 / 3 / 34', '80 / 3 / 27')
              text = text.replace('meets_required_depth: 73', 'meets_required_depth: 80')
              text = text.replace('validated_skeleton_only: 34', 'validated_skeleton_only: 27')

              if path.name == 'core-task-055-post-service-completion-audit.test.ts':
                  text = text.replace("assert.equal(audit.nextTask, 'CORE-TASK-057B');", "assert.equal(audit.nextTask, 'CORE-TASK-057C');")
                  text = text.replace('remaining 42 unresolved', 'remaining 35 unresolved')
                  text = text.replace('audit.unresolvedInventory.total, 42', 'audit.unresolvedInventory.total, 35')
                  text = text.replace('api: 13', 'api: 6')
                  text = text.replace('validated_skeleton_only: 34', 'validated_skeleton_only: 27')
                  text = text.replace('\n      24\n', '\n      17\n')
                  text = text.replace('[0, 14, 4, 6, 0]', '[0, 7, 4, 6, 0]')

              if path.name == 'core-task-056-book-02-event-evidence.test.ts':
                  text = text.replace('meets_required_depth: 73', 'meets_required_depth: 80')
                  text = text.replace('validated_skeleton_only: 34', 'validated_skeleton_only: 27')
                  text = text.replace('\n      42\n', '\n      35\n')
                  text = text.replace('\n      24\n', '\n      17\n')
                  text = text.replace("'CORE-TASK-057B'", "'CORE-TASK-057C'")

              if path.name == 'book-02-mvp-gap-baseline.test.ts':
                  text = text.replace('must-api-customer-api-contract', 'must-api-agent-api-contract')

              if path.name == 'core-fixture-manifest.test.ts':
                  text = text.replace("it('has exactly 49 entries'", "it('has exactly 50 entries'")
                  text = text.replace('CORE_FIXTURE_MANIFEST.length, 49', 'CORE_FIXTURE_MANIFEST.length, 50')
                  marker = "      'core_task_057a_api_boundaries',\n"
                  addition = marker + "      'core_task_057b_api_boundaries',\n"
                  if "'core_task_057b_api_boundaries'" not in text:
                      text = text.replace(marker, addition)

              if path.name == 'core-task-057a-api-boundary-foundation.test.ts':
                  text = text.replace(
                      '    assert.equal(CORE_API_BOUNDARY_EVIDENCE.length, 5);\n    for (const evidence of CORE_API_BOUNDARY_EVIDENCE) {',
                      "    const evidence057a = CORE_API_BOUNDARY_EVIDENCE.filter((entry) =>\n      CORE_TASK_057A_API_BOUNDARY_SPECS.some((spec) => spec.domainId === entry.domainId)\n    );\n    assert.equal(evidence057a.length, 5);\n    for (const evidence of evidence057a) {"
                  )

              if text != original:
                  path.write_text(text)

          fixture_test = Path('tests/fixtures/core-task-057a-api-boundaries-fixture.test.ts')
          text = fixture_test.read_text()
          original = text
          if 'const domainIds = new Set' not in text:
              text = text.replace(
                  "import {\n  CORE_API_BOUNDARY_EVIDENCE,\n  validateCoreApiBoundaryFixture\n} from '../../src/index.ts';\n",
                  "import {\n  CORE_API_BOUNDARY_EVIDENCE,\n  validateCoreApiBoundaryFixture\n} from '../../src/index.ts';\n\nconst domainIds = new Set([\n  'identity',\n  'organization',\n  'user',\n  'permission',\n  'policy'\n]);\n"
              )
              text = text.replace(
                  '    assert.deepEqual(fixture, CORE_API_BOUNDARY_EVIDENCE);',
                  '    assert.deepEqual(\n      fixture,\n      CORE_API_BOUNDARY_EVIDENCE.filter((entry) => domainIds.has(entry.domainId))\n    );'
              )
          if text != original:
              fixture_test.write_text(text)
          PY

      - name: Add formal CORE-TASK-057B evidence tests
        shell: bash
        run: |
          cat > tests/fixtures/core-task-057b-api-boundaries-fixture.test.ts <<'EOF'
          import assert from 'node:assert/strict';
          import { readFile } from 'node:fs/promises';
          import { describe, it } from 'node:test';
          import {
            CORE_API_BOUNDARY_EVIDENCE,
            validateCoreApiBoundaryFixture
          } from '../../src/index.ts';

          const domainIds = new Set([
            'customer',
            'brand',
            'trademark',
            'jurisdiction',
            'classification',
            'document',
            'evidence'
          ]);

          describe('CORE-TASK-057B API boundary fixture', () => {
            it('matches deterministic source evidence and validates cleanly', async () => {
              const fixture = JSON.parse(
                await readFile(
                  'fixtures/api/core-task-057b-api-boundaries.fixture.json',
                  'utf8'
                )
              );
              const expected = CORE_API_BOUNDARY_EVIDENCE.filter((entry) =>
                domainIds.has(entry.domainId)
              );
              assert.deepEqual(fixture, expected);
              assert.equal(validateCoreApiBoundaryFixture(fixture).ok, true);
            });
          });
          EOF

          cat > tests/unit/core-task-057b-api-boundary-foundation.test.ts <<'EOF'
          import assert from 'node:assert/strict';
          import { describe, it } from 'node:test';
          import {
            CORE_API_BOUNDARY_EVIDENCE,
            CORE_GOVERNED_API_REQUIRED_CAPABILITIES,
            validateCoreApiBoundaryEvidence
          } from '../../src/index.ts';

          const domainIds = new Set([
            'customer',
            'brand',
            'trademark',
            'jurisdiction',
            'classification',
            'document',
            'evidence'
          ]);

          describe('CORE-TASK-057B governed API boundaries', () => {
            it('locks seven executable API boundaries with owning-Service delegation', () => {
              assert.deepEqual(validateCoreApiBoundaryEvidence(), []);
              const evidence = CORE_API_BOUNDARY_EVIDENCE.filter((entry) =>
                domainIds.has(entry.domainId)
              );
              assert.equal(evidence.length, 7);
              assert.deepEqual(
                evidence.map((entry) => entry.domainId),
                [
                  'customer',
                  'brand',
                  'trademark',
                  'jurisdiction',
                  'classification',
                  'document',
                  'evidence'
                ]
              );
              for (const entry of evidence) {
                assert.equal(entry.currentDepth, 'level_2');
                assert.deepEqual(
                  entry.provenCapabilities,
                  CORE_GOVERNED_API_REQUIRED_CAPABILITIES
                );
                assert.deepEqual(entry.unresolvedCapabilities, []);
                assert.equal(entry.directDomainMutation, false);
                assert.equal(entry.directEventEmission, false);
                assert.ok(entry.operationCount > 0);
                assert.ok(entry.owningServiceContractId.startsWith('core-service-'));
              }
            });
          });
          EOF

          cat > tests/unit/core-task-057b-book-02-api-evidence.test.ts <<'EOF'
          import assert from 'node:assert/strict';
          import { describe, it } from 'node:test';
          import { BOOK_02_MVP_GAP_BASELINE } from '../../src/index.ts';

          const requirementIds = [
            'must-api-customer-api-contract',
            'must-api-brand-api-contract',
            'must-api-trademark-api-contract',
            'must-api-jurisdiction-api-contract',
            'must-api-classification-api-contract',
            'must-api-document-api-contract',
            'must-api-evidence-api-contract'
          ];

          describe('CORE-TASK-057B Book 02 API evidence', () => {
            it('promotes seven APIs without claiming all-API completion', () => {
              const requirements = requirementIds.map((id) =>
                BOOK_02_MVP_GAP_BASELINE.requirements.find(
                  (requirement) => requirement.id === id
                )
              );
              assert.equal(requirements.every(Boolean), true);
              assert.equal(
                requirements.every(
                  (requirement) =>
                    requirement?.currentDisposition === 'meets_required_depth'
                ),
                true
              );
              assert.deepEqual(BOOK_02_MVP_GAP_BASELINE.summary.mustBuildNow, {
                total: 115,
                meets_required_depth: 80,
                partial_evidence: 3,
                validated_skeleton_only: 27,
                boundary_scaffold_only: 5,
                semantic_overlap_only: 0,
                fixture_only: 0,
                missing: 0
              });
              const allApiCriterion =
                BOOK_02_MVP_GAP_BASELINE.acceptanceCriteria.find(
                  (criterion) => criterion.id === 'must-build-api-validators-exist'
                );
              assert.equal(allApiCriterion?.satisfied, false);
              assert.equal(
                BOOK_02_MVP_GAP_BASELINE.summary.acceptance.book02MvpComplete,
                false
              );
            });
          });
          EOF

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm install --global pnpm@10
          pnpm install --frozen-lockfile

      - name: Regenerate deterministic fixtures
        shell: bash
        run: |
          cat > .core-task-057b-api-fixtures.mjs <<'EOF'
          import { writeFileSync } from 'node:fs';
          import { CORE_API_BOUNDARY_EVIDENCE } from './src/index.ts';
          const domainIds057a = new Set([
            'identity', 'organization', 'user', 'permission', 'policy'
          ]);
          const domainIds057b = new Set([
            'customer', 'brand', 'trademark', 'jurisdiction',
            'classification', 'document', 'evidence'
          ]);
          writeFileSync(
            'fixtures/api/core-task-057a-api-boundaries.fixture.json',
            JSON.stringify(
              CORE_API_BOUNDARY_EVIDENCE.filter((entry) => domainIds057a.has(entry.domainId)),
              null,
              2
            ) + '\n'
          );
          writeFileSync(
            'fixtures/api/core-task-057b-api-boundaries.fixture.json',
            JSON.stringify(
              CORE_API_BOUNDARY_EVIDENCE.filter((entry) => domainIds057b.has(entry.domainId)),
              null,
              2
            ) + '\n'
          );
          EOF
          pnpm exec tsx .core-task-057b-api-fixtures.mjs
          rm .core-task-057b-api-fixtures.mjs

          cat > .core-task-057b-baselines.mjs <<'EOF'
          import { writeFileSync } from 'node:fs';
          import {
            BOOK_02_MVP_GAP_BASELINE,
            BOOK_02_POST_SERVICE_COMPLETION_AUDIT
          } from './src/index.ts';
          writeFileSync(
            'fixtures/mvp-coverage/book-02-mvp-gap-baseline.fixture.json',
            JSON.stringify(BOOK_02_MVP_GAP_BASELINE, null, 2) + '\n'
          );
          writeFileSync(
            'fixtures/mvp-coverage/book-02-post-service-completion-audit.fixture.json',
            JSON.stringify(BOOK_02_POST_SERVICE_COMPLETION_AUDIT, null, 2) + '\n'
          );
          EOF
          pnpm exec tsx .core-task-057b-baselines.mjs
          rm .core-task-057b-baselines.mjs

      - name: Format
        run: pnpm format
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm format:check
      - name: Validate fixtures
        run: pnpm validate:fixtures
      - name: Test
        run: pnpm test
      - name: Contract coverage
        run: pnpm coverage:contracts
      - name: Contract gaps
        run: pnpm gaps:contracts
      - name: Contract acceptance
        run: pnpm acceptance:contracts
      - name: Behavior coverage
        run: pnpm coverage:behavior
      - name: Behavior gaps
        run: pnpm gaps:behavior
      - name: Behavior acceptance
        run: pnpm acceptance:behavior
      - name: Book 02 MVP gaps
        run: pnpm gaps:mvp

      - name: Publish clean implementation commit
        shell: bash
        run: |
          rm -f .github/workflows/core-task-057b-workspace.yml
          rm -f .github/workflows/core-task-057b-fixture-diagnostic.yml
          rm -f .github/workflows/core-task-057b-test-diagnostic.yml
          rm -f .github/workflows/core-task-057b-format-diagnostic.yml
          rm -rf _automation/core-task-057b
          rm -f docs/architecture/core-task-057b-domain-api-boundary-foundation.md
          git config user.name 'MarkOrbit Automation'
          git config user.email 'automation@markorbit.local'
          git add -A
          git commit -m 'feat(core): implement CORE-TASK-057B domain API boundaries'
          git push --force origin HEAD:agent/core-task-057b-domain-api-boundaries-v2
