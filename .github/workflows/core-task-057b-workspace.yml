name: CORE-TASK-057B Apply Conflict Diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/core-task-057b-workspace.yml'
      - '_automation/core-task-057b/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose-apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: agent/core-task-057b-domain-api-boundaries-v2
          fetch-depth: 0

      - name: Decode implementation patch
        shell: bash
        run: |
          base64 --decode _automation/core-task-057b/implementation.patch.gz.b64 > /tmp/core-task-057b.patch.gz
          gzip --test /tmp/core-task-057b.patch.gz
          gzip --decompress --stdout /tmp/core-task-057b.patch.gz > /tmp/core-task-057b.patch

      - name: Capture apply conflict
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          set +e
          git apply --check --verbose /tmp/core-task-057b.patch > /tmp/core-task-057b-apply.txt 2>&1
          status=$?
          cat /tmp/core-task-057b-apply.txt
          exit "$status"

      - name: Upload apply conflict
        uses: actions/upload-artifact@v4
        with:
          name: core-task-057b-apply-conflict
          path: /tmp/core-task-057b-apply.txt
          if-no-files-found: error
          retention-days: 1

      - name: Enforce diagnostic result
        if: steps.apply.outcome == 'failure'
        run: exit 1
