name: CORE-TASK-057B Workspace

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/core-task-057b-workspace.yml'
      - 'docs/architecture/core-task-057b-domain-api-boundaries.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Core task branch
        uses: actions/checkout@v4
        with:
          path: core
          fetch-depth: 0
      - name: Checkout locked Book 02 authority
        uses: actions/checkout@v4
        with:
          repository: whalemarks/markorbit-publication
          ref: 3349ecb8955021a8714d023348f8b24f941eb98f
          path: publication
      - name: Pack deterministic workspace
        run: tar -czf core-task-057b-workspace.tgz core publication
      - name: Upload workspace
        uses: actions/upload-artifact@v4
        with:
          name: core-task-057b-workspace
          path: core-task-057b-workspace.tgz
          if-no-files-found: error
          retention-days: 1
