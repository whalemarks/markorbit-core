name: CORE-TASK-042B Sync MVP Fixture

on:
  pull_request:

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Synchronize Book 02 Evidence fixture
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import json

          path = Path('fixtures/mvp-coverage/book-02-mvp-gap-baseline.fixture.json')
          data = json.loads(path.read_text())
          requirement = next(
              item for item in data['requirements']
              if item['id'] == 'must-service-evidence-service'
          )
          requirement['implementationFiles'] = [
              'src/contracts/service/core-service-contract-skeletons.ts',
              'src/services/evidence/core-evidence-service.ts',
              'src/services/evidence/core-evidence-service-complete.ts',
          ]
          requirement['testFiles'] = [
              'tests/unit/core-evidence-service-proof-layer-foundation.test.ts',
              'tests/unit/core-evidence-service-mvp-completion.test.ts',
          ]
          path.write_text(json.dumps(data, indent=2, ensure_ascii=False) + '\n')
          PY
          pnpm exec prettier --write fixtures/mvp-coverage/book-02-mvp-gap-baseline.fixture.json

      - name: Commit fixture synchronization
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fixtures/mvp-coverage/book-02-mvp-gap-baseline.fixture.json
          git commit -m "CORE-TASK-042B — synchronize Book 02 Evidence fixture"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
