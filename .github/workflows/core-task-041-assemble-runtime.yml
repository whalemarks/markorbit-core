name: CORE-TASK-041 Assemble Runtime

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/core-task-041-assemble-runtime.yml'

permissions:
  contents: write

jobs:
  assemble:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Assemble Document runtime
        run: |
          mkdir -p src/services/document
          cat .tmp/core-task-041-runtime.part* | base64 --decode > src/services/document/core-document-service.ts
          printf "// Governed CORE-TASK-041 Document Service public surface.\nexport * from './core-document-service.ts';\n" > src/services/document/index.ts
          rm -rf .tmp
          rm .github/workflows/core-task-041-assemble-runtime.yml
      - name: Commit assembled runtime
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'CORE-TASK-041 — Add Document Service runtime foundation'
          git push
