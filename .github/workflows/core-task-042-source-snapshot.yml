name: CORE-TASK-042 Source Snapshot

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/core-task-042-source-snapshot.yml'

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create source archive
        shell: bash
        run: |
          git archive --format=zip --output=markorbit-core-source.zip HEAD
      - uses: actions/upload-artifact@v4
        with:
          name: core-task-042-source
          path: markorbit-core-source.zip
