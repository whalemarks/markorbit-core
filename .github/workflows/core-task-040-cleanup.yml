name: CORE-TASK-040 Cleanup

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/core-task-040-cleanup.yml'

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Remove temporary CORE-TASK-040 tooling
        run: |
          git rm -f \
            .github/core-task-040-trigger \
            .github/workflows/core-task-040-diagnose.yml \
            .github/workflows/core-task-040-generate.yml \
            .github/workflows/core-task-040-history.yml \
            .github/workflows/core-task-040-refresh.yml \
            .github/workflows/core-task-040-cleanup.yml \
            scripts/core-task-040-classification-caller-update.mjs \
            scripts/core-task-040-generate.mjs \
            scripts/core-task-040-refresh-baseline.mjs \
            scripts/core-task-040-repair.mjs \
            scripts/core-task-040-update-history-test.mjs
      - name: Commit cleanup
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'CORE-TASK-040 — Remove temporary generation tooling'
          git push
