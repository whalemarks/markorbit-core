name: CORE-TASK-042 Integrate

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/core-task-042-integrate.yml'

permissions:
  contents: write

jobs:
  diagnose-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Reassemble remote source patch
        shell: bash
        run: |
          cat .core-task-042/patch-{00..10} > core-task-042-remote.patch
          sha256sum core-task-042-remote.patch
      - uses: actions/upload-artifact@v4
        with:
          name: core-task-042-remote-patch
          path: core-task-042-remote.patch
