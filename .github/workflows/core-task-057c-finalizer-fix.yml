name: CORE-TASK-057C Finalizer Fix

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/core-task-057c-finalizer-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/core-task-057c-final-api-boundaries
          fetch-depth: 0
      - name: Repair generator lifecycle
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('.github/workflows/core-task-057c-finalize.yml')
          s=p.read_text()
          s=s.replace("          pnpm exec tsx .generate-057c-baseline.mjs\n          rm .generate-057c-baseline.mjs\n          python - <<'PY'", "          pnpm exec tsx .generate-057c-baseline.mjs\n          python - <<'PY'", 1)
          s=s.replace("          pnpm exec tsx .generate-057c-baseline.mjs\n\n      - name: Validate repository", "          pnpm exec tsx .generate-057c-baseline.mjs\n          rm .generate-057c-baseline.mjs\n\n      - name: Validate repository", 1)
          p.write_text(s)
          PY
          rm -f .github/workflows/core-task-057c-finalizer-fix.yml
          git config user.name 'MarkOrbit Automation'
          git config user.email 'automation@markorbit.local'
          git add -A
          git commit -m 'fix(ci): keep CORE-TASK-057C baseline generator for second pass'
          git push origin HEAD:agent/core-task-057c-final-api-boundaries
