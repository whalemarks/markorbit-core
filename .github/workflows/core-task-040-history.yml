name: CORE-TASK-040 Update History Test

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/core-task-040-update-history-test.mjs'
      - '.github/workflows/core-task-040-history.yml'

permissions:
  contents: write

jobs:
  update-history:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node scripts/core-task-040-update-history-test.mjs
      - name: Commit history-test update
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tests/unit/core-task-039-book-02-service-evidence.test.ts
          if git diff --cached --quiet; then
            echo 'No history-test change.'
            exit 0
          fi
          git commit -m 'CORE-TASK-040 — Preserve prior Service evidence tests'
          git push
