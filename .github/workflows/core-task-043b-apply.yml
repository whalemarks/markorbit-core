name: CORE-TASK-043B Apply

on:
  push:
    branches:
      - agent/core-task-043b-matter-service-completion

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/core-task-043b-matter-service-completion
      - name: Apply payload
        shell: bash
        run: |
          cat > /tmp/payload.b64 <<'PAYLOAD'

PAYLOAD
          base64 -d /tmp/payload.b64 > /tmp/payload.tgz
          tar -xzf /tmp/payload.tgz -C .
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .
          git commit -m "CORE-TASK-043B — complete Matter Service behavior"
          git push
