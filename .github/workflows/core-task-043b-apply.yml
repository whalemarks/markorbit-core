name: CORE-TASK-043B Apply

on:
  push:
    branches:
      - agent/core-task-043b-matter-service-completion

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/core-task-043b-matter-service-completion
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Apply Matter Service completion
        shell: bash
        run: |
          base64 -d .core-task-043b/payload.b64 > /tmp/core043b.tgz
          tar -xzf /tmp/core043b.tgz
          python apply.py
          node --import tsx - <<'NODE'
          import { writeFile } from 'node:fs/promises';
          import { CORE_SERVICE_CONTRACT_SKELETONS } from './src/contracts/service/core-service-contract-skeletons.ts';
          import { BOOK_02_MVP_GAP_BASELINE } from './src/mvp-coverage/book-02-mvp-gap-baseline.ts';
          await writeFile('fixtures/contracts/core-service-contract-skeletons.fixture.json', JSON.stringify(CORE_SERVICE_CONTRACT_SKELETONS, null, 2) + '\n');
          await writeFile('fixtures/mvp-coverage/book-02-mvp-gap-baseline.fixture.json', JSON.stringify(BOOK_02_MVP_GAP_BASELINE, null, 2) + '\n');
          NODE
          pnpm format
          pnpm typecheck
          pnpm lint
          pnpm validate:fixtures
          node --import tsx --test tests/unit/core-matter-service-execution-container.test.ts tests/unit/core-task-043-service-contract-metadata.test.ts
          rm -f apply.py
          rm -rf .core-task-043b
          rm -f .github/workflows/core-task-043-workspace.yml
          rm -f .github/workflows/core-task-043b-apply.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "CORE-TASK-043B — complete Matter Service behavior"
          git push origin HEAD:agent/core-task-043b-matter-service-completion
