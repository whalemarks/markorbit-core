name: CORE-TASK-041 Test Output

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/core-task-041-test-output.yml'

jobs:
  test-output:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Save test output
        shell: bash
        run: pnpm test > tests.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: core-task-041-tests
          path: tests.log
