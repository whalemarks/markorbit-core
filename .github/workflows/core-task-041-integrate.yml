name: CORE-TASK-041 Integrate

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/core-task-041-integrate.yml'

permissions:
  contents: write

jobs:
  integrate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: node scripts/core-task-041-integrate.mjs
      - run: pnpm format
      - run: pnpm exec tsx scripts/core-task-041-refresh.mjs
      - run: pnpm format
      - name: Remove temporary integration tooling and commit
        run: |
          git rm scripts/core-task-041-integrate.mjs scripts/core-task-041-refresh.mjs .github/workflows/core-task-041-integrate.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'CORE-TASK-041 — Integrate Document Service evidence and governance'
          git push
