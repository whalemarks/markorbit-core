name: CORE-TASK-057C Finalize v2

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/core-task-057c-finalize-v2.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/core-task-057c-final-api-boundaries
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Extract corrected formal steps
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/core-task-057c-finalize.yml').read_text().splitlines()

          def extract(step_name: str) -> str:
              start = next(i for i, line in enumerate(source) if line == f'      - name: {step_name}')
              run_index = next(i for i in range(start + 1, len(source)) if source[i] == '        run: |')
              body = []
              for line in source[run_index + 1:]:
                  if line.startswith('      - name: ') or line.startswith('      - uses: '):
                      break
                  body.append(line[10:] if line.startswith('          ') else line)
              return '\n'.join(body).rstrip() + '\n'

          scripts = {
              'generate': extract('Generate final API boundary implementation'),
              'fixtures': extract('Generate fixtures and migrate baselines'),
              'validate': extract('Validate repository'),
              'publish': extract('Publish clean commit')
          }
          scripts['fixtures'] = scripts['fixtures'].replace(
              'pnpm exec tsx .generate-057c-baseline.mjs\nrm .generate-057c-baseline.mjs\npython - <<\'PY\'',
              'pnpm exec tsx .generate-057c-baseline.mjs\npython - <<\'PY\'',
              1
          ).replace(
              'pnpm exec tsx .generate-057c-baseline.mjs\n',
              'pnpm exec tsx .generate-057c-baseline.mjs\nrm .generate-057c-baseline.mjs\n',
              1
          )
          scripts['publish'] = scripts['publish'].replace(
              "rm -f .github/workflows/core-task-057c-finalize.yml\n",
              "rm -f .github/workflows/core-task-057c-finalize.yml\nrm -f .github/workflows/core-task-057c-finalize-v2.yml\nrm -f .github/workflows/core-task-057c-finalizer-fix.yml\n"
          )
          for name, content in scripts.items():
              path = Path(f'/tmp/core-task-057c-{name}.sh')
              path.write_text('#!/usr/bin/env bash\nset -euo pipefail\n' + content)
              path.chmod(0o755)
          PY

      - name: Generate implementation
        run: /tmp/core-task-057c-generate.sh

      - name: Install dependencies
        run: |
          npm install --global pnpm@10
          pnpm install --frozen-lockfile

      - name: Generate fixtures
        run: /tmp/core-task-057c-fixtures.sh

      - name: Validate repository
        run: /tmp/core-task-057c-validate.sh

      - name: Publish clean commit
        run: /tmp/core-task-057c-publish.sh
