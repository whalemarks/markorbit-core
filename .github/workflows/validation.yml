name: Validation

on:
  pull_request:

jobs:
  diagnose-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with diagnostics
        id: test
        shell: bash
        run: |
          set +e
          pnpm test 2>&1 | tee test.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload test diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: core-task-038-remaining-test-log
          path: test.log

      - name: Fail when tests failed
        if: steps.test.outputs.exit_code != '0'
        run: exit 1
