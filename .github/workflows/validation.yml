name: Validation

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose-core-task-038:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: codex/core-task-038-trademark-service-core-lifecycle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Repair generator target
        run: pnpm exec tsx scripts/core-task-038-fix-generator.mjs

      - name: Run generator with diagnostics
        id: generate
        shell: bash
        run: |
          set +e
          pnpm exec tsx scripts/core-task-038-generate.mjs > generator.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload generator diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: core-task-038-generator-log-2
          path: generator.log

      - name: Fail when generator failed
        if: steps.generate.outputs.exit_code != '0'
        run: exit 1
