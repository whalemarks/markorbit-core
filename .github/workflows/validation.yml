name: Validation

on:
  push:
    branches:
      - codex/core-task-037-brand-service-core-lifecycle

permissions:
  contents: write

jobs:
  apply-core-task-037:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: codex/core-task-037-brand-service-core-lifecycle
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply governed patches and regenerate fixtures
        run: pnpm exec tsx scripts/core-task-037-apply-patches.mjs

      - name: Format governed generated files
        run: pnpm format

      - name: Commit governed migration
        run: |
          if git diff --quiet; then
            echo "No generated changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src scripts fixtures tests
          git commit -m "CORE-TASK-037 — Wire Brand Service evidence and baseline"
          git push origin HEAD:codex/core-task-037-brand-service-core-lifecycle
