name: Validation

on:
  pull_request:
  push:
    branches:
      - main
      - codex/core-task-032-validation-traceability-lock

permissions:
  contents: write

jobs:
  regenerate-baseline:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate Book 02 baseline fixture
        run: >-
          pnpm tsx -e "import { writeFileSync } from 'node:fs';
          import { BOOK_02_MVP_GAP_BASELINE } from './src/mvp-coverage/index.ts';
          writeFileSync('fixtures/mvp-coverage/book-02-mvp-gap-baseline.fixture.json',
          JSON.stringify(BOOK_02_MVP_GAP_BASELINE, null, 2) + '\n');"

      - name: Format generated fixture
        run: pnpm exec prettier --write fixtures/mvp-coverage/book-02-mvp-gap-baseline.fixture.json

      - name: Commit generated fixture
        shell: bash
        run: |
          if git diff --quiet -- fixtures/mvp-coverage/book-02-mvp-gap-baseline.fixture.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fixtures/mvp-coverage/book-02-mvp-gap-baseline.fixture.json
          git commit -m "CORE-TASK-036 — Regenerate Book 02 MVP baseline fixture"
          git push origin HEAD:${{ github.head_ref }}

  validation:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Validate fixtures
        run: pnpm validate:fixtures

      - name: Test
        run: pnpm test

      - name: Contract coverage
        run: pnpm coverage:contracts

      - name: Contract gaps
        run: pnpm gaps:contracts

      - name: Contract acceptance
        run: pnpm acceptance:contracts

      - name: Behavior coverage
        run: pnpm coverage:behavior

      - name: Behavior gaps
        run: pnpm gaps:behavior
      - name: Behavior acceptance
        run: pnpm acceptance:behavior

      - name: Book 02 MVP gaps
        run: pnpm gaps:mvp
