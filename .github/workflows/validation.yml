name: Validation

on:
  pull_request:

permissions:
  contents: write

jobs:
  generate-core-task-038:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: codex/core-task-038-trademark-service-core-lifecycle
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Repair generator target
        run: pnpm exec tsx scripts/core-task-038-fix-generator.mjs

      - name: Run generator
        id: generate
        shell: bash
        run: |
          set +e
          pnpm exec tsx scripts/core-task-038-generate.mjs 2>&1 | tee generator.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload generator diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: core-task-038-generator-log
          path: generator.log

      - name: Format governed files
        if: steps.generate.outputs.exit_code == '0'
        run: pnpm format

      - name: Commit generated batch
        if: steps.generate.outputs.exit_code == '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "CORE-TASK-038 — Implement Trademark Service core lifecycle"
          git push origin HEAD:codex/core-task-038-trademark-service-core-lifecycle

      - name: Fail when generator failed
        if: steps.generate.outputs.exit_code != '0'
        run: exit 1
