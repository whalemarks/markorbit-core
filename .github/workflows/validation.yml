name: Validation

on:
  pull_request:
  push:
    branches:
      - codex/core-task-037-brand-service-core-lifecycle

permissions:
  contents: write

jobs:
  apply-leaf-import-repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: codex/core-task-037-brand-service-core-lifecycle
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply leaf import repair
        run: pnpm exec tsx scripts/core-task-037-use-leaf-test-import.mjs

      - name: Format governed files
        run: pnpm format

      - name: Commit leaf import repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "CORE-TASK-037 — Use leaf Brand evidence imports"
          git push origin HEAD:codex/core-task-037-brand-service-core-lifecycle
