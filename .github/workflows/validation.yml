name: Validation

on:
  pull_request:

permissions:
  contents: write

jobs:
  repair-core-task-038:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: codex/core-task-038-trademark-service-core-lifecycle
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run contract promotion repair
        id: repair
        shell: bash
        run: |
          set +e
          pnpm exec tsx scripts/core-task-038-promote-trademark-contract.mjs 2>&1 | tee repair.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload repair diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: core-task-038-contract-repair-log
          path: repair.log

      - name: Format governed files
        if: steps.repair.outputs.exit_code == '0'
        run: pnpm format

      - name: Commit repair
        if: steps.repair.outputs.exit_code == '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "CORE-TASK-038 — Promote Trademark Service contract in place"
          git push origin HEAD:codex/core-task-038-trademark-service-core-lifecycle

      - name: Fail when repair failed
        if: steps.repair.outputs.exit_code != '0'
        run: exit 1
