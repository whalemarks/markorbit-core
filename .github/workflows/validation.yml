name: Validation

on:
  pull_request:

jobs:
  diagnose-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck with diagnostics
        id: typecheck
        shell: bash
        run: |
          set +e
          pnpm typecheck 2>&1 | tee typecheck.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload typecheck diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: core-task-038-typecheck-log
          path: typecheck.log

      - name: Fail when typecheck failed
        if: steps.typecheck.outputs.exit_code != '0'
        run: exit 1
