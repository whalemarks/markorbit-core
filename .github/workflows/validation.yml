name: Validation

on:
  pull_request:
  push:
    branches:
      - codex/core-task-037-brand-service-core-lifecycle

permissions:
  contents: write

jobs:
  finalize-core-task-037:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: codex/core-task-037-brand-service-core-lifecycle
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply final cleanup
        run: pnpm exec tsx scripts/core-task-037-finalize.mjs

      - name: Format governed files
        run: pnpm format

      - name: Commit final cleanup
        run: |
          if git diff --quiet; then
            echo "No cleanup changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src tests README.md CORE-MANIFEST.md CORE-ROADMAP.md CHANGELOG.md docs fixtures
          git commit -m "CORE-TASK-037 — Finalize Brand Service governance evidence"
          git push origin HEAD:codex/core-task-037-brand-service-core-lifecycle
