name: Validation

on:
  pull_request:

permissions:
  contents: write

jobs:
  repair-legacy-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: codex/core-task-038-trademark-service-core-lifecycle
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Repair legacy metadata test
        run: pnpm exec tsx scripts/core-task-038-fix-legacy-metadata-test.mjs

      - name: Format governed files
        run: pnpm format

      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "CORE-TASK-038 — Make legacy Service evidence tests forward-compatible"
          git push origin HEAD:codex/core-task-038-trademark-service-core-lifecycle
