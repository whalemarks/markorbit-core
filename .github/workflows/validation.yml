name: Validation

on:
  pull_request:

jobs:
  diagnose-fixtures:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run fixtures with diagnostics
        id: fixtures
        shell: bash
        run: |
          set +e
          pnpm validate:fixtures 2>&1 | tee fixtures.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload fixture diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: core-task-038-fixtures-log
          path: fixtures.log

      - name: Fail when fixtures failed
        if: steps.fixtures.outputs.exit_code != '0'
        run: exit 1
