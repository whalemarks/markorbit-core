name: Validation

on:
  pull_request:
  push:
    branches:
      - main
      - codex/core-task-032-validation-traceability-lock

jobs:
  validation:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        shell: bash
        run: |
          set +e
          pnpm typecheck > typecheck.log 2>&1
          status=$?
          cat typecheck.log
          exit $status

      - name: Upload typecheck diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-${{ matrix.node-version }}
          path: typecheck.log

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Validate fixtures
        run: pnpm validate:fixtures

      - name: Test
        run: pnpm test

      - name: Contract coverage
        run: pnpm coverage:contracts

      - name: Contract gaps
        run: pnpm gaps:contracts

      - name: Contract acceptance
        run: pnpm acceptance:contracts

      - name: Behavior coverage
        run: pnpm coverage:behavior

      - name: Behavior gaps
        run: pnpm gaps:behavior
      - name: Behavior acceptance
        run: pnpm acceptance:behavior

      - name: Book 02 MVP gaps
        run: pnpm gaps:mvp
