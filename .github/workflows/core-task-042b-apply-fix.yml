name: CORE-TASK-042B Apply Fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply typecheck fixes
        shell: python
        run: |
          from pathlib import Path

          service = Path('src/services/evidence/core-evidence-service-complete.ts')
          text = service.read_text()
          text = text.replace(
              "const idempotent = this.deps.idempotencyRegistry.executeBehavior(\n      {",
              "const idempotent = this.deps.idempotencyRegistry.executeBehavior<\n      Record<string, unknown>,\n      CoreEvidenceCompletedRecord\n    >(\n      {",
          )
          service.write_text(text)

          test = Path('tests/unit/core-evidence-service-mvp-completion.test.ts')
          text = test.read_text()
          text = text.replace(
              "  createCoreEventId,\n  createCoreSafeError,",
              "  createCoreContractId,\n  createCoreEventId,\n  createCoreObjectType,\n  createCoreSafeError,",
          )
          text = text.replace(
              "if (!evidenceReference) throw new Error('Evidence fixture reference is missing.');",
              "if (!evidenceReference) throw new Error('Evidence fixture reference is missing.');\nconst governedEvidenceReference = evidenceReference;",
          )
          text = text.replace(
              "    objectType: 'evidence-record',",
              "    objectType: createCoreObjectType('evidence-record'),",
          )
          text = text.replace(
              "    objectContractId: 'core-object-evidence-record-contract',",
              "    objectContractId: createCoreContractId(\n      'core-object-evidence-record-contract'\n    ),",
          )
          text = text.replace(
              '    publicReferenceRecord: evidenceReference,',
              '    publicReferenceRecord: governedEvidenceReference,',
          )
          test.write_text(text)

      - name: Commit fixes
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/services/evidence/core-evidence-service-complete.ts tests/unit/core-evidence-service-mvp-completion.test.ts
          git commit -m "CORE-TASK-042B — fix typecheck"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
