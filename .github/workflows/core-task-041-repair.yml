name: CORE-TASK-041 Repair

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/core-task-041-repair.yml'

permissions:
  contents: write

jobs:
  repair:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: node scripts/core-task-041-repair.mjs
      - run: pnpm format
      - run: pnpm typecheck
      - name: Remove temporary diagnostics and commit
        run: |
          git rm scripts/core-task-041-repair.mjs .github/workflows/core-task-041-repair.yml .github/workflows/core-task-041-diagnose.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'CORE-TASK-041 — Repair Document evidence typing'
          git push
