name: CORE-TASK-057B Fixture Diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/core-task-057b-fixture-diagnostic.yml'
      - '_automation/core-task-057b/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose-fixtures:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: agent/core-task-057b-domain-api-boundaries-v2
          fetch-depth: 0

      - name: Decode and apply implementation patch
        shell: bash
        run: |
          base64 --decode _automation/core-task-057b/implementation.patch.gz.b64 > /tmp/core-task-057b.patch.gz
          gzip --test /tmp/core-task-057b.patch.gz
          gzip --decompress --stdout /tmp/core-task-057b.patch.gz > /tmp/core-task-057b.patch
          git apply --check /tmp/core-task-057b.patch
          git apply /tmp/core-task-057b.patch
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/validate-core-fixtures.mjs')
          text = path.read_text()
          marker = '  core_task_057a_api_boundaries: validateCoreApiBoundaryFixture,\n'
          if 'core_task_057b_api_boundaries' not in text:
              text = text.replace(
                  marker,
                  marker + '  core_task_057b_api_boundaries: validateCoreApiBoundaryFixture,\n'
              )
              path.write_text(text)
          PY

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm install --global pnpm@10
          pnpm install --frozen-lockfile

      - name: Regenerate deterministic fixtures
        shell: bash
        run: |
          cat > .core-task-057b-generate.mjs <<'EOF'
          import { writeFileSync } from 'node:fs';
          import {
            CORE_API_BOUNDARY_EVIDENCE,
            BOOK_02_MVP_GAP_BASELINE,
            BOOK_02_POST_SERVICE_COMPLETION_AUDIT
          } from './src/index.ts';
          const domainIds = new Set([
            'customer', 'brand', 'trademark', 'jurisdiction',
            'classification', 'document', 'evidence'
          ]);
          writeFileSync(
            'fixtures/api/core-task-057a-api-boundaries.fixture.json',
            JSON.stringify(CORE_API_BOUNDARY_EVIDENCE, null, 2) + '\n'
          );
          writeFileSync(
            'fixtures/api/core-task-057b-api-boundaries.fixture.json',
            JSON.stringify(
              CORE_API_BOUNDARY_EVIDENCE.filter((entry) => domainIds.has(entry.domainId)),
              null,
              2
            ) + '\n'
          );
          writeFileSync(
            'fixtures/mvp-coverage/book-02-mvp-gap-baseline.fixture.json',
            JSON.stringify(BOOK_02_MVP_GAP_BASELINE, null, 2) + '\n'
          );
          writeFileSync(
            'fixtures/mvp-coverage/book-02-post-service-completion-audit.fixture.json',
            JSON.stringify(BOOK_02_POST_SERVICE_COMPLETION_AUDIT, null, 2) + '\n'
          );
          EOF
          pnpm exec tsx .core-task-057b-generate.mjs
          rm .core-task-057b-generate.mjs

      - name: Upload generated CORE-TASK-057B fixture
        uses: actions/upload-artifact@v4
        with:
          name: core-task-057b-generated-fixture
          path: fixtures/api/core-task-057b-api-boundaries.fixture.json
          if-no-files-found: error
          retention-days: 1

      - name: Capture fixture validation
        id: fixtures
        continue-on-error: true
        shell: bash
        run: |
          set +e
          pnpm validate:fixtures > /tmp/core-task-057b-fixtures.txt 2>&1
          status=$?
          cat /tmp/core-task-057b-fixtures.txt
          exit "$status"

      - name: Upload fixture validation
        uses: actions/upload-artifact@v4
        with:
          name: core-task-057b-fixture-validation
          path: /tmp/core-task-057b-fixtures.txt
          if-no-files-found: error
          retention-days: 1

      - name: Enforce diagnostic result
        if: steps.fixtures.outcome == 'failure'
        run: exit 1
