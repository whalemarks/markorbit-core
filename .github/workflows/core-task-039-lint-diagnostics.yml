name: CORE-TASK-039 Lint Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  lint-diagnostics:
    if: github.head_ref == 'codex/core-task-039-jurisdiction-service-core-lifecycle'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Capture lint diagnostics
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee core-task-039-lint.log

      - name: Upload lint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-task-039-lint-log
          path: core-task-039-lint.log
          if-no-files-found: ignore
