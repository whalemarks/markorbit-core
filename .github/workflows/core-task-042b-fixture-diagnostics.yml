name: CORE-TASK-042B Fixture Diagnostics

on:
  pull_request:

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Capture fixture validation and derived criterion
        shell: bash
        run: |
          set +e
          pnpm validate:fixtures > fixture-validation.log 2>&1
          echo $? > fixture-validation.exit
          pnpm exec tsx <<'TS' > acceptance-comparison.log 2>&1
          import { readFileSync } from 'node:fs';
          import { BOOK_02_MVP_GAP_BASELINE } from './src/index.ts';
          const fixture = JSON.parse(
            readFileSync(
              'fixtures/mvp-coverage/book-02-mvp-gap-baseline.fixture.json',
              'utf8'
            )
          );
          const id = 'must-build-services-own-behavior';
          const derived = BOOK_02_MVP_GAP_BASELINE.acceptanceCriteria.find(
            (entry) => entry.id === id
          );
          const stored = fixture.acceptanceCriteria.find(
            (entry: { id: string }) => entry.id === id
          );
          console.log('DERIVED');
          console.log(JSON.stringify(derived, null, 2));
          console.log('STORED');
          console.log(JSON.stringify(stored, null, 2));
          TS
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: core-task-042b-fixture-diagnostics
          path: |
            fixture-validation.log
            fixture-validation.exit
            acceptance-comparison.log
