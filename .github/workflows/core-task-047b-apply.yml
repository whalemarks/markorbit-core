name: CORE-TASK-047B Apply

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/core-task-047b-task-service-completion
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Apply validated implementation
        shell: bash
        run: |
          set -euo pipefail
          cat .core-task-047b-payload/part-00.bin .core-task-047b-payload/part-01.bin .core-task-047b-payload/part-02.bin .core-task-047b-payload/part-03.bin .core-task-047b-payload/rem-00.bin .core-task-047b-payload/rem-01.bin .core-task-047b-payload/rem-02.bin .core-task-047b-payload/rem-03.bin .core-task-047b-payload/rem-04.bin .core-task-047b-payload/rem-05.bin .core-task-047b-payload/rem-06.bin .core-task-047b-payload/rem-07a.bin .core-task-047b-payload/rem-07b.bin .core-task-047b-payload/rem-08.bin > /tmp/payload.tgz
          echo '6e000b7eeb0e1c744bfd010295c0c1421d503ae214376c9292748dcc9e9bb843  /tmp/payload.tgz' | sha256sum -c -
          tar -xzf /tmp/payload.tgz
          node scripts/write-book-02-mvp-gap-baseline.mjs
          rm -rf .core-task-047b-payload .core-task-047b-in-progress
          pnpm exec prettier --write fixtures/mvp-coverage/book-02-mvp-gap-baseline.fixture.json
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A . ':!.github/workflows/core-task-047b-apply.yml'
          git commit -m 'CORE-TASK-047B — complete Task Service actionable-work implementation'
          git push origin HEAD:agent/core-task-047b-task-service-completion
