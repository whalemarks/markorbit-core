name: CORE-TASK-039 Finalize

on:
  pull_request:

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'codex/core-task-039-jurisdiction-service-core-lifecycle'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: codex/core-task-039-jurisdiction-service-core-lifecycle
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply final evidence repair
        run: |
          node scripts/core-task-039-finalize-evidence.mjs
          pnpm exec prettier --write \
            package.json \
            fixtures/services/core-jurisdiction-service-core-lifecycle.fixture.json \
            src/service-coverage/core-jurisdiction-service-evidence-fixture.ts \
            tests/unit/core-jurisdiction-service-core-lifecycle.test.ts

      - name: Commit final evidence repair
        run: |
          git config user.name "markorbit-core automation"
          git config user.email "actions@users.noreply.github.com"
          git add package.json fixtures/services/core-jurisdiction-service-core-lifecycle.fixture.json src/service-coverage/core-jurisdiction-service-evidence-fixture.ts tests/unit/core-jurisdiction-service-core-lifecycle.test.ts
          git commit -m "CORE-TASK-039 — Prove Jurisdiction code uniqueness"
          git push origin HEAD:codex/core-task-039-jurisdiction-service-core-lifecycle
