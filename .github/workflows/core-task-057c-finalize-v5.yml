name: CORE-TASK-057C Finalize v5

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/core-task-057c-finalize-v5.yml'
      - '_automation/core-task-057c-terminal-migration.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/core-task-057c-final-api-boundaries
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Extract formal steps
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          source=Path('.github/workflows/core-task-057c-finalize.yml').read_text().splitlines()
          def extract(name):
              start=next(i for i,l in enumerate(source) if l==f'      - name: {name}')
              run=next(i for i in range(start+1,len(source)) if source[i]=='        run: |')
              out=[]
              for l in source[run+1:]:
                  if l.startswith('      - name: ') or l.startswith('      - uses: '): break
                  out.append(l[10:] if l.startswith('          ') else l)
              return out
          scripts={n:extract(label) for n,label in {'generate':'Generate final API boundary implementation','fixtures':'Generate fixtures and migrate baselines','publish':'Publish clean commit'}.items()}
          lines=[l for l in scripts['fixtures'] if l.strip()!='rm .generate-057c-baseline.mjs']
          idx=[i for i,l in enumerate(lines) if l.strip()=='pnpm exec tsx .generate-057c-baseline.mjs']
          lines.insert(idx[-1]+1,'rm .generate-057c-baseline.mjs')
          scripts['fixtures']=lines
          cleanup=[
              'rm -f .github/workflows/core-task-057c-finalize-v2.yml',
              'rm -f .github/workflows/core-task-057c-finalize-v3.yml',
              'rm -f .github/workflows/core-task-057c-finalize-v4.yml',
              'rm -f .github/workflows/core-task-057c-finalize-v5.yml',
              'rm -f .github/workflows/core-task-057c-finalizer-fix.yml',
              'rm -f .github/workflows/core-task-057c-typecheck-diagnostic.yml',
              'rm -f .github/workflows/core-task-057c-fixture-diagnostic.yml',
              'rm -f _automation/core-task-057c-terminal-migration.py']
          publish=[]
          for l in scripts['publish']:
              publish.append(l)
              if l.strip()=='rm -f .github/workflows/core-task-057c-finalize.yml': publish.extend(cleanup)
          scripts['publish']=publish
          for name,lines in scripts.items():
              p=Path(f'/tmp/057c-{name}.sh'); p.write_text('#!/usr/bin/env bash\nset -euo pipefail\n'+'\n'.join(lines)+'\n'); p.chmod(0o755)
          PY
      - name: Generate implementation
        run: /tmp/057c-generate.sh
      - name: Correct terminal evidence
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('src/api-coverage/core-api-boundary-evidence.ts')
          lines=p.read_text().splitlines()
          start=next(i for i,line in enumerate(lines) if line.startswith('export const CORE_TASK_057B_API_BOUNDARY_EVIDENCE'))
          end=next(i for i in range(start,len(lines)) if lines[i].strip()==');')
          replacement=[
              'export const CORE_TASK_057B_API_BOUNDARY_EVIDENCE = evidenceFor(',
              '  CORE_TASK_057B_API_BOUNDARY_SPECS,',
              "  'CORE-TASK-057B'",
              ');'
          ]
          lines=lines[:start]+replacement+lines[end+1:]
          s='\n'.join(lines)+'\n'
          s=s.replace("  'src/api/core-governed-api-specs-057c.ts',\n", '')
          if "implementationTask === 'CORE-TASK-057C'" not in s:
              s=s.replace(
                  '    implementationFiles,\n',
                  "    implementationFiles: implementationTask === 'CORE-TASK-057C'\n      ? [...implementationFiles, 'src/api/core-governed-api-specs-057c.ts']\n      : implementationFiles,\n"
              )
          p.write_text(s)
          PY
          python _automation/core-task-057c-terminal-migration.py
      - name: Install dependencies
        run: |
          npm install --global pnpm@10
          pnpm install --frozen-lockfile
      - name: Generate fixtures
        run: /tmp/057c-fixtures.sh
      - name: Format
        run: pnpm format
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm format:check
      - name: Validate fixtures
        run: pnpm validate:fixtures
      - name: Test
        id: test
        continue-on-error: true
        shell: bash
        run: |
          set +e
          pnpm test 2>&1 | tee /tmp/core-task-057c-test.log
          status=${PIPESTATUS[0]}
          {
            grep -nE 'not ok|AssertionError|ERR_|Expected|actual|expected' /tmp/core-task-057c-test.log | tail -n 260 || true
            echo '--- tail ---'
            tail -n 360 /tmp/core-task-057c-test.log
          } > /tmp/core-task-057c-test-failure.txt
          exit "$status"
      - name: Upload test failure
        if: steps.test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: core-task-057c-test-failure
          path: /tmp/core-task-057c-test-failure.txt
          retention-days: 1
      - name: Enforce test success
        if: steps.test.outcome == 'failure'
        run: exit 1
      - name: Contract coverage
        run: pnpm coverage:contracts
      - name: Contract gaps
        run: pnpm gaps:contracts
      - name: Contract acceptance
        run: pnpm acceptance:contracts
      - name: Behavior coverage
        run: pnpm coverage:behavior
      - name: Behavior gaps
        run: pnpm gaps:behavior
      - name: Behavior acceptance
        run: pnpm acceptance:behavior
      - name: Book 02 MVP gaps
        run: pnpm gaps:mvp
      - name: Publish clean commit
        run: /tmp/057c-publish.sh
