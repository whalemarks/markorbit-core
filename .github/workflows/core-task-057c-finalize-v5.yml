name: CORE-TASK-057C Finalize v5

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/core-task-057c-finalize-v5.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/core-task-057c-final-api-boundaries
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Extract formal steps
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          source=Path('.github/workflows/core-task-057c-finalize.yml').read_text().splitlines()
          def extract(name):
              start=next(i for i,l in enumerate(source) if l==f'      - name: {name}')
              run=next(i for i in range(start+1,len(source)) if source[i]=='        run: |')
              out=[]
              for l in source[run+1:]:
                  if l.startswith('      - name: ') or l.startswith('      - uses: '): break
                  out.append(l[10:] if l.startswith('          ') else l)
              return out
          scripts={n:extract(label) for n,label in {'generate':'Generate final API boundary implementation','fixtures':'Generate fixtures and migrate baselines','publish':'Publish clean commit'}.items()}
          lines=[l for l in scripts['fixtures'] if l.strip()!='rm .generate-057c-baseline.mjs']
          idx=[i for i,l in enumerate(lines) if l.strip()=='pnpm exec tsx .generate-057c-baseline.mjs']
          lines.insert(idx[-1]+1,'rm .generate-057c-baseline.mjs')
          scripts['fixtures']=lines
          cleanup=[
              'rm -f .github/workflows/core-task-057c-finalize-v2.yml',
              'rm -f .github/workflows/core-task-057c-finalize-v3.yml',
              'rm -f .github/workflows/core-task-057c-finalize-v4.yml',
              'rm -f .github/workflows/core-task-057c-finalize-v5.yml',
              'rm -f .github/workflows/core-task-057c-finalizer-fix.yml',
              'rm -f .github/workflows/core-task-057c-typecheck-diagnostic.yml',
              'rm -f .github/workflows/core-task-057c-fixture-diagnostic.yml']
          publish=[]
          for l in scripts['publish']:
              publish.append(l)
              if l.strip()=='rm -f .github/workflows/core-task-057c-finalize.yml': publish.extend(cleanup)
          scripts['publish']=publish
          for name,lines in scripts.items():
              p=Path(f'/tmp/057c-{name}.sh'); p.write_text('#!/usr/bin/env bash\nset -euo pipefail\n'+'\n'.join(lines)+'\n'); p.chmod(0o755)
          PY
      - name: Generate implementation
        run: /tmp/057c-generate.sh
      - name: Correct terminal evidence and acceptance mapping
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('src/api-coverage/core-api-boundary-evidence.ts')
          s=p.read_text().replace(
              "CORE_TASK_057B_API_BOUNDARY_SPECS,\n  CORE_TASK_057C_API_BOUNDARY_SPECS,\n  'CORE-TASK-057B'",
              "CORE_TASK_057B_API_BOUNDARY_SPECS,\n  'CORE-TASK-057B'"
          )
          s=s.replace("  'src/api/core-governed-api-specs-057c.ts',\n", '')
          s=s.replace(
              '    implementationFiles,\n',
              "    implementationFiles: implementationTask === 'CORE-TASK-057C'\n      ? [...implementationFiles, 'src/api/core-governed-api-specs-057c.ts']\n      : implementationFiles,\n"
          )
          p.write_text(s)

          p=Path('src/mvp-coverage/book-02-mvp-requirements.ts')
          s=p.read_text().replace(
              "  'api-layer-does-not-emit-events-directly': ['must-test-api-contract-tests'],",
              "  'api-layer-does-not-emit-events-directly': MUST_BUILD_DOMAINS.map(\n    (domain) => `must-api-${domain}-api-contract`\n  ),"
          )
          p.write_text(s)
          PY
      - name: Install dependencies
        run: |
          npm install --global pnpm@10
          pnpm install --frozen-lockfile
      - name: Generate fixtures
        run: /tmp/057c-fixtures.sh
      - name: Migrate terminal Book 02 assertions
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          for p in Path('tests/unit').glob('*.test.ts'):
              s=p.read_text(); o=s
              s=s.replace('meets_required_depth: 80','meets_required_depth: 86')
              s=s.replace('validated_skeleton_only: 27','validated_skeleton_only: 21')
              s=s.replace('acceptanceCriteriaSatisfied,\n      12','acceptanceCriteriaSatisfied,\n      14')
              if p.name == 'core-task-055-post-service-completion-audit.test.ts':
                  s=s.replace("assert.equal(audit.nextTask, 'CORE-TASK-057C');", "assert.equal(audit.nextTask, 'CORE-TASK-058A');")
                  s=s.replace('remaining 35 unresolved Must Build requirements','remaining 29 unresolved Must Build requirements')
                  s=s.replace('audit.unresolvedInventory.total, 35','audit.unresolvedInventory.total, 29')
                  s=s.replace("      api: 6,\n", '')
                  s=s.replace('validated_skeleton_only: 27','validated_skeleton_only: 21')
                  s=s.replace('        17\n','        11\n')
                  s=s.replace('locks the seven unresolved acceptance criteria exactly','locks the five unresolved acceptance criteria exactly')
                  s=s.replace("        'must-build-api-validators-exist',\n", '')
                  s=s.replace("        'api-layer-does-not-emit-events-directly',\n", '')
                  s=s.replace('[0, 7, 4, 6, 0]','[0, 1, 4, 6, 0]')
              if p.name == 'core-task-056-book-02-event-evidence.test.ts':
                  s=s.replace('unresolvedInventory.total,\n      35','unresolvedInventory.total,\n      29')
                  s=s.replace('completionBlockingNonDomainRequirementIds.length,\n      17','completionBlockingNonDomainRequirementIds.length,\n      11')
                  s=s.replace("      'CORE-TASK-057C'", "      'CORE-TASK-058A'")
              if p.name == 'core-task-057a-book-02-api-evidence.test.ts':
                  s=s.replace('leaves the remaining six API requirements structural and fail-closed','confirms no Must Build API requirements remain structural')
                  s=s.replace('assert.equal(incomplete.length, 6);','assert.equal(incomplete.length, 0);')
                  s=s.replace('without falsely completing the API acceptance criterion','and completes the API acceptance criterion')
                  s=s.replace('assert.equal(apiCriterion?.satisfied, false);','assert.equal(apiCriterion?.satisfied, true);')
                  s=s.replace('retains six unresolved API blockers and selects CORE-TASK-057C','closes API blockers and selects CORE-TASK-058A')
                  s=s.replace('unresolvedInventory.total,\n      35','unresolvedInventory.total,\n      29')
                  old="""assert.equal(
      BOOK_02_POST_SERVICE_COMPLETION_AUDIT.unresolvedInventory.byLayer.api,
      6
    );"""
                  new="""assert.equal(
      'api' in BOOK_02_POST_SERVICE_COMPLETION_AUDIT.unresolvedInventory.byLayer,
      false
    );"""
                  s=s.replace(old,new)
                  s=s.replace('completionBlockingNonDomainRequirementIds.length,\n      17','completionBlockingNonDomainRequirementIds.length,\n      11')
                  s=s.replace("      'CORE-TASK-057C'", "      'CORE-TASK-058A'")
              if p.name == 'core-task-057b-book-02-api-evidence.test.ts':
                  s=s.replace('without claiming all-API completion','as part of completed all-API coverage')
                  s=s.replace('summary.mustBuildNow.meets_required_depth,\n      80','summary.mustBuildNow.meets_required_depth,\n      86')
                  s=s.replace('summary.mustBuildNow.validated_skeleton_only,\n      27','summary.mustBuildNow.validated_skeleton_only,\n      21')
              if s!=o: p.write_text(s)
          PY
      - name: Format
        run: pnpm format
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm format:check
      - name: Validate fixtures
        run: pnpm validate:fixtures
      - name: Test
        id: test
        continue-on-error: true
        shell: bash
        run: |
          set +e
          pnpm test 2>&1 | tee /tmp/core-task-057c-test.log
          status=${PIPESTATUS[0]}
          {
            grep -nE 'not ok|AssertionError|ERR_|Expected|actual|expected' /tmp/core-task-057c-test.log | tail -n 260 || true
            echo '--- tail ---'
            tail -n 360 /tmp/core-task-057c-test.log
          } > /tmp/core-task-057c-test-failure.txt
          exit "$status"
      - name: Upload test failure
        if: steps.test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: core-task-057c-test-failure
          path: /tmp/core-task-057c-test-failure.txt
          retention-days: 1
      - name: Enforce test success
        if: steps.test.outcome == 'failure'
        run: exit 1
      - name: Contract coverage
        run: pnpm coverage:contracts
      - name: Contract gaps
        run: pnpm gaps:contracts
      - name: Contract acceptance
        run: pnpm acceptance:contracts
      - name: Behavior coverage
        run: pnpm coverage:behavior
      - name: Behavior gaps
        run: pnpm gaps:behavior
      - name: Behavior acceptance
        run: pnpm acceptance:behavior
      - name: Book 02 MVP gaps
        run: pnpm gaps:mvp
      - name: Publish clean commit
        run: /tmp/057c-publish.sh
