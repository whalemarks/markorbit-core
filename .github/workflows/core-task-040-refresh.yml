name: CORE-TASK-040 Refresh Baseline

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/core-task-040-refresh-baseline.mjs'
      - '.github/workflows/core-task-040-refresh.yml'

permissions:
  contents: write

jobs:
  refresh:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsx scripts/core-task-040-refresh-baseline.mjs
      - name: Commit refreshed baseline
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add fixtures/mvp-coverage/book-02-mvp-gap-baseline.fixture.json
          if git diff --cached --quiet; then
            echo 'No baseline change.'
            exit 0
          fi
          git commit -m 'CORE-TASK-040 — Refresh Book 02 Classification baseline'
          git push
