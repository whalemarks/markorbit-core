name: CORE-TASK-039 Revert Noise

on:
  pull_request:

permissions:
  contents: write

jobs:
  revert-noise:
    if: github.head_ref == 'codex/core-task-039-jurisdiction-service-core-lifecycle'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: codex/core-task-039-jurisdiction-service-core-lifecycle
          fetch-depth: 0

      - name: Restore unrelated files from main
        run: |
          git fetch origin main
          git checkout origin/main -- \
            src/contracts/service/index.ts \
            src/service-coverage/core-customer-service-evidence-fixture.ts \
            src/validation/core-fixture-validation.ts \
            src/validation/core-validation-result.ts

      - name: Commit cleanup
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No files changed."
            exit 0
          fi
          git config user.name "markorbit-core automation"
          git config user.email "actions@users.noreply.github.com"
          git add src/contracts/service/index.ts src/service-coverage/core-customer-service-evidence-fixture.ts src/validation/core-fixture-validation.ts src/validation/core-validation-result.ts
          git commit -m "CORE-TASK-039 — Restore unrelated files"
          git push origin HEAD:codex/core-task-039-jurisdiction-service-core-lifecycle
