name: CORE-TASK-042B Regenerate Book 02 Fixture

on:
  pull_request:

permissions:
  contents: write

jobs:
  regenerate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Regenerate canonical baseline fixture
        shell: bash
        run: |
          pnpm exec tsx <<'TS'
          import { writeFileSync } from 'node:fs';
          import { BOOK_02_MVP_GAP_BASELINE } from './src/index.ts';

          writeFileSync(
            'fixtures/mvp-coverage/book-02-mvp-gap-baseline.fixture.json',
            `${JSON.stringify(BOOK_02_MVP_GAP_BASELINE, null, 2)}\n`
          );
          TS
          pnpm exec prettier --write fixtures/mvp-coverage/book-02-mvp-gap-baseline.fixture.json
      - name: Commit canonical fixture
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fixtures/mvp-coverage/book-02-mvp-gap-baseline.fixture.json
          git commit -m "CORE-TASK-042B — regenerate canonical Book 02 fixture"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
