name: CORE-TASK-042B Sync Acceptance Evidence

on:
  pull_request:

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Synchronize acceptance evidence
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import json

          path = Path('fixtures/mvp-coverage/book-02-mvp-gap-baseline.fixture.json')
          data = json.loads(path.read_text())
          criterion = next(
              item for item in data['acceptanceCriteria']
              if item['id'] == 'must-build-services-own-behavior'
          )
          criterion['evidenceFiles'] = sorted(set([
              *criterion['evidenceFiles'],
              'src/services/evidence/core-evidence-service-complete.ts',
              'tests/unit/core-evidence-service-mvp-completion.test.ts',
          ]))
          path.write_text(json.dumps(data, indent=2, ensure_ascii=False) + '\n')
          PY
          pnpm exec prettier --write fixtures/mvp-coverage/book-02-mvp-gap-baseline.fixture.json
      - name: Commit acceptance evidence
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fixtures/mvp-coverage/book-02-mvp-gap-baseline.fixture.json
          git commit -m "CORE-TASK-042B — synchronize acceptance evidence"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
