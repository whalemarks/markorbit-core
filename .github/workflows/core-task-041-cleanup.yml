name: CORE-TASK-041 Cleanup

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/core-task-041-cleanup.yml'

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Remove temporary workflow files
        run: |
          git rm .github/workflows/core-task-041-test-output.yml .github/workflows/core-task-041-cleanup.yml
      - name: Commit cleanup
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'CORE-TASK-041 — Remove temporary test tooling'
          git push
